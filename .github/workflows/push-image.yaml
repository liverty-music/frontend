name: Deploy Frontend

# Dual trigger:
#  - push to main      -> dev AR (liverty-music-dev/frontend). Every push to
#                         main runs this workflow (no paths: trigger gate). A
#                         per-run "build vs inherit" decision over the pushed
#                         range (event.before..sha) picks build (docker
#                         build-push) or inherit (crane-copy the parent tip's
#                         dev digest onto :<sha>, re-point :main/:latest — used
#                         when the push changed no build-relevant file).
#  - release published -> retag dev AR digest into prod AR
#                         (liverty-music-prod/frontend)
#
# Per OpenSpec change `promote-prod-image-via-retag`, the release path
# does NOT rebuild — it promotes the exact dev AR digest for the
# release's commit SHA into prod AR via `crane copy`. The image
# deployed to prod is byte-identical to the dev AR image already
# exercised in dev. This avoids the ~90s redundant rebuild
# on every release and removes a class of non-determinism (dev vs prod
# image divergence) that the env-agnostic bundle (per
# `adopt-runtime-config-for-frontend`) made obsolete.
#
# Per OpenSpec change `guarantee-dev-image-per-main-commit`, the `paths:`
# trigger gate was removed so EVERY main commit gets a resolvable dev
# `:<sha>` image (by build or by parent-digest inheritance). This makes
# "any main commit is releasable" a true invariant: a release cut on main
# HEAD always resolves a dev image. The former glob set now drives the
# in-workflow build-vs-inherit decision instead of gating the trigger.
on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      smoke_url:
        description: 'Run post-deploy smoke against this URL only (no build/push). Use after a prod pin-bump merges in cloud-provisioning.'
        required: true
        type: string
        default: 'https://liverty-music.app'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    # Defensive guard layer 1 (event filter): only fire on the two supported
    # events. The `target_commitish == 'main'` check is intentionally
    # absent — it's release-creation metadata, not a verified assertion
    # about the tag's underlying commit (mirrors the analysis in backend
    # PR #297 review threads 3248512589 / 3248513873). The authoritative
    # check is the runtime `Verify release commit on main` step below,
    # which compares `github.sha` against `origin/main` history.
    # workflow_dispatch is excluded — that path only runs the smoke job.
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'release' && github.event.action == 'published')
    runs-on: ubuntu-latest
    environment:
      # release -> prod; push to main -> dev. The `prod` environment binds
      # vars.PROJECT_ID=liverty-music-prod / vars.WORKLOAD_IDENTITY_PROVIDER /
      # vars.SERVICE_ACCOUNT scoped to the prod project (managed by Pulumi's
      # GitHubRepositoryComponent — see cloud-provisioning/src/github/).
      name: ${{ github.event_name == 'release' && 'prod' || 'dev' }}
    permissions:
      contents: read
      id-token: write
    env:
      REGION: ${{ vars.REGION }}
      PROJECT_ID: ${{ vars.PROJECT_ID }}
      REPOSITORY: ${{ github.event.repository.name }}
      IMAGE: web-app
      WORKLOAD_IDENTITY_PROVIDER: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
      SERVICE_ACCOUNT: ${{ vars.SERVICE_ACCOUNT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the push-path "build vs inherit" decision can
          # diff the pushed range (event.before..sha), and so the release
          # path's ancestry verification has main's history available.
          fetch-depth: 0

      # Defensive guard layer 2 (runtime verification): for release events,
      # confirm the checked-out commit (`github.sha`, == the tag's commit)
      # is actually reachable from `origin/main`. Closes the gap where:
      #   * a tag points at a non-main commit, AND
      #   * the release was created with `--target main` (so a literal
      #     `target_commitish == 'main'` event-level check would falsely
      #     pass), OR
      #   * the release was created with `--target <sha>` (where the SHA
      #     happens to be main HEAD but the literal `target_commitish`
      #     string is the SHA, not `"main"`).
      # See backend PR #297 review threads 3248512589 (false-negative)
      # and 3248513873 (false-positive) for the analysis.
      - name: Verify release commit is on main
        if: github.event_name == 'release'
        run: |
          git fetch origin main --depth=100
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "::error::Release tag at $(git rev-parse HEAD) is not reachable from origin/main ($(git rev-parse origin/main)). Refusing to push prod images. Cut releases on a commit reachable from main — main HEAD is always valid, since every main commit has a resolvable dev image (guarantee-dev-image-per-main-commit)."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ====================================================================
      # Dev push path: build env-agnostic image, push to dev AR
      # ====================================================================
      # `Configure Docker` is shared by both paths: the dev push uses
      # buildx's pusher, and the release path uses `crane copy`, which
      # reads its auth from Docker's config.json credential helpers (the
      # gcloud helper for *.pkg.dev). Without this step crane falls
      # back to anonymous and fails with 403 on the prod AR write.
      # `Set up Docker Buildx` remains dev-only.

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      # =====================================================================
      # Push path: decide build vs inherit
      # =====================================================================
      # The `paths:` trigger gate was removed (guarantee-dev-image-per-main-commit)
      # so every push to main runs this workflow. Replicate the former glob set
      # as an in-workflow decision over the pushed range event.before..sha:
      #   * any build-relevant file changed -> build (produces a fresh image)
      #   * none changed                     -> inherit the parent tip's digest
      #     so this commit still gets a :<sha> image (byte-identical to parent).
      # Force-push and branch-creation are NOT inheritable and route to build:
      #   * force-push: `github.event.before` is the previous, now-orphaned tip
      #     (a real non-zero SHA, flagged by `github.event.forced == true`) that
      #     is not necessarily an ancestor of the new tip.
      #   * branch creation: `github.event.before` is the zero SHA
      #     (`github.event.created == true`).
      # An otherwise-unresolvable parent commit also defaults to build.
      - name: Decide build vs inherit (push path)
        if: github.event_name == 'push'
        id: decide
        env:
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
          FORCED: ${{ github.event.forced }}
          CREATED: ${{ github.event.created }}
        run: |
          set -uo pipefail
          if [ "${FORCED}" = "true" ] || [ "${CREATED}" = "true" ] || [ -z "${BEFORE}" ] || [ "${BEFORE}" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            echo "Force-push / branch-creation / unresolvable parent (forced=${FORCED} created=${CREATED} before=${BEFORE}) -> build."
            echo "mode=build" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "${BEFORE}" "${SHA}")
          echo "Changed files in ${BEFORE}..${SHA}:"
          echo "${changed}"
          # Build glob set (kept in lock-step with the prior `on.push.paths`).
          if echo "${changed}" | grep -qE '^src/|^public/|^scripts/|^package\.json$|^package-lock\.json$|^vite\.config\.ts$|^Dockerfile$|^Caddyfile$|^\.github/workflows/push-image\.yaml$'; then
            echo "Build-relevant change detected -> build."
            echo "mode=build" >> "$GITHUB_OUTPUT"
          else
            echo "No build-relevant change -> inherit parent digest."
            echo "mode=inherit" >> "$GITHUB_OUTPUT"
          fi

      - name: Set Image URI (dev path)
        if: github.event_name == 'push' && steps.decide.outputs.mode == 'build'
        run: echo "IMAGE_URI=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}" >> $GITHUB_ENV

      # Dev tag set: :latest (consumed by ArgoCD Image Updater for dev
      # auto-rollout) + :sha (immutable digest pointer) + :main.
      - name: Set Image Tags (dev path)
        if: github.event_name == 'push' && steps.decide.outputs.mode == 'build'
        run: echo "IMAGE_TAGS=${{ env.IMAGE_URI }}:latest,${{ env.IMAGE_URI }}:${{ github.sha }},${{ env.IMAGE_URI }}:main" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        if: github.event_name == 'push' && steps.decide.outputs.mode == 'build'
        uses: docker/setup-buildx-action@v3

      # No env-specific build-args: per OpenSpec archive
      # `adopt-runtime-config-for-frontend`, the bundle is env-agnostic.
      # Per-env values come from /config.json at runtime (mounted from a
      # K8s ConfigMap). The Dockerfile runs `npm run verify:build-templates`
      # after `npm run build` as a defense-in-depth gate against
      # template-stripping regressions (the class of bug that produced
      # the v1.0.0 blank-screen Sev-1).
      - name: Build and Push Docker Image
        if: github.event_name == 'push' && steps.decide.outputs.mode == 'build'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ====================================================================
      # Release path: retag the dev AR digest into prod AR — no rebuild
      # ====================================================================
      # Per OpenSpec archive `promote-prod-image-via-retag`, every release
      # promotes the exact dev AR digest for the release's commit SHA into
      # prod AR. The prod CI service account has scoped reader on
      # `liverty-music-dev/frontend` (granted by
      # `cloud-provisioning#282`, declared in `src/gcp/index.ts` as
      # `prod-ci-frontend-ar-reader`).
      #
      # Source FQDN is hardcoded to `liverty-music-dev/frontend/web-app`
      # because the dev project ID is the constant source of every prod
      # promotion. Destination FQDN uses `vars.PROJECT_ID`
      # (= `liverty-music-prod` per the `prod` environment binding) to
      # match the prod-AR convention enforced by `prod-image-pipeline`.

      # Install `crane` (go-containerregistry's registry CLI) for the
      # cross-repository / cross-project digest copy. `gcloud artifacts
      # docker tags add` is intentionally NOT used here: despite its
      # name, it only renames tags within a single repository — passing
      # a source from `liverty-music-dev/frontend/web-app` and a
      # destination in `liverty-music-prod/frontend/web-app` fails with
      # `Image ... does not match image ...`. `crane copy` is the
      # registry-to-registry primitive; within the same AR region it
      # uses cross-repo blob mounting so no image bytes actually
      # transfer (manifest re-push only).
      #
      # Note: the action's name is `setup-crane`, and it installs the
      # `crane` binary — NOT the `gcrane` wrapper (a GCR-specific
      # convenience build from the same go-containerregistry repo that
      # the action does not ship). `crane` works identically for AR.
      # Auth: `crane` reads `~/.docker/config.json` populated by the
      # `Configure Docker` step above.
      - name: Install crane
        if: github.event_name == 'release' || (github.event_name == 'push' && steps.decide.outputs.mode == 'inherit')
        uses: imjasonh/setup-crane@v0.4

      # =====================================================================
      # Push/inherit path: this commit changed nothing build-relevant, so its
      # image is byte-identical to the parent push tip's. Copy the parent's
      # digest onto :<sha> (and re-point :main, :latest) — no rebuild. This
      # keeps the "every main commit has a resolvable dev :<sha>" invariant.
      # =====================================================================
      - name: Inherit parent dev AR digest (push path, no rebuild)
        if: github.event_name == 'push' && steps.decide.outputs.mode == 'inherit'
        env:
          DEV_AR_IMAGE: ${{ env.REGION }}-docker.pkg.dev/liverty-music-dev/${{ env.REPOSITORY }}/${{ env.IMAGE }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
        run: |
          # Resolve ONLY the parent push tip's digest (event.before). By
          # induction + the `concurrency` serialization, :<before> exists in
          # steady state. There is deliberately NO fallback to :main or any
          # other tag: it would only fire when :<before> is missing (parent
          # run FAILED), and in that gapped state :main can point at an older
          # commit whose tree differs — inheriting it would pin non-equivalent
          # bytes onto :<sha> and silently ship the wrong bundle to prod. A
          # missing :<before> means the chain is genuinely broken -> fail loud.
          #
          # Errors are classified like the release-path resolve (auth -> fail
          # fast; transient -> retry; NOT_FOUND -> chain-broken) so an IAM/5xx
          # failure is not misreported as a "seed the chain" instruction. -e
          # is enabled only around the crane copies.
          set -uo pipefail
          stderr_file=$(mktemp)
          digest=""
          for attempt in $(seq 1 3); do
            rc=0
            digest=$(gcloud artifacts docker images describe "${DEV_AR_IMAGE}:${BEFORE}" \
              --format='value(image_summary.digest)' 2>"$stderr_file") || rc=$?
            if [ "$rc" -eq 0 ] && [ -n "$digest" ]; then break; fi
            body=$(cat "$stderr_file")
            if echo "$body" | grep -qE 'PERMISSION_DENIED|Permission .* denied|HTTPError 403|403 Forbidden|UNAUTHENTICATED|401'; then
              echo "::error::Auth failure resolving ${DEV_AR_IMAGE}:${BEFORE} (dev AR read) — NOT a missing-tag/chain problem. Check the dev build service account's AR read access. stderr: ${body}"
              rm -f "$stderr_file"; exit 1
            fi
            digest=""
            if [ "$attempt" -lt 3 ]; then
              echo "Attempt ${attempt}/3: ${DEV_AR_IMAGE}:${BEFORE} not resolvable yet (${body}); retrying in 20s..."
              sleep 20
            fi
          done
          rm -f "$stderr_file"
          if [ -z "${digest}" ]; then
            echo "::error::Cannot resolve parent dev image ${DEV_AR_IMAGE}:${BEFORE} after 3 attempts. The inherit chain is broken — the parent push failed or never wrote :${BEFORE}. Seed by pushing a build-relevant change (any src/** / package.json / Dockerfile) to main to force a fresh build, then re-cut the release on the new HEAD. Not writing :${SHA} to avoid pinning a wrong digest."
            exit 1
          fi
          echo "Inheriting digest ${digest} onto :${SHA}, :main, :latest."
          # Abort immediately if any of the three retags fails.
          set -e
          crane copy "${DEV_AR_IMAGE}@${digest}" "${DEV_AR_IMAGE}:${SHA}"
          crane copy "${DEV_AR_IMAGE}@${digest}" "${DEV_AR_IMAGE}:main"
          crane copy "${DEV_AR_IMAGE}@${digest}" "${DEV_AR_IMAGE}:latest"

      - name: Resolve dev AR digest for github.sha
        if: github.event_name == 'release'
        id: resolve_digest
        env:
          DEV_AR_IMAGE: ${{ env.REGION }}-docker.pkg.dev/liverty-music-dev/${{ env.REPOSITORY }}/${{ env.IMAGE }}
        run: |
          # 6 total attempts (initial + 5 retries) × 60s wait between =
          # ~5-minute total budget. Absorbs the race window where a
          # release is cut seconds after merge-to-main and the dev push
          # is still in-flight. Per the spec, this is a SHALL retry, not
          # a MAY — silent failure on the digest-resolve step is exactly
          # what the retry contract prevents.
          for attempt in $(seq 1 6); do
            digest=$(gcloud artifacts docker images describe \
              "${DEV_AR_IMAGE}:${GITHUB_SHA}" \
              --format='value(image_summary.digest)' \
              2>/dev/null || echo "")
            if [ -n "$digest" ]; then
              echo "Resolved digest on attempt ${attempt}/6: $digest"
              echo "digest=$digest" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ "$attempt" -lt 6 ]; then
              echo "Attempt ${attempt}/6: dev AR :sha not yet available; waiting 60s..."
              sleep 60
            fi
          done
          echo "::error::dev AR tag :${GITHUB_SHA} not found after 6 attempts (~5 min total wait). Given the every-main-commit-has-an-image invariant (guarantee-dev-image-per-main-commit), the push-path build/inherit for this commit is still in-flight or failed — do NOT re-target an earlier commit; re-run the push-path 'Deploy Frontend' run for this SHA. See docs/runbooks/prod-image-tag-pinning.md#retag-failure-recovery in cloud-provisioning."
          exit 1

      - name: Promote dev AR digest to prod AR (semver tag)
        if: github.event_name == 'release'
        env:
          DEV_AR_IMAGE: ${{ env.REGION }}-docker.pkg.dev/liverty-music-dev/${{ env.REPOSITORY }}/${{ env.IMAGE }}
          PROD_AR_IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}
          DIGEST: ${{ steps.resolve_digest.outputs.digest }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          crane copy \
            "${DEV_AR_IMAGE}@${DIGEST}" \
            "${PROD_AR_IMAGE}:${RELEASE_TAG}"

      - name: Promote dev AR digest to prod AR (commit SHA tag)
        if: github.event_name == 'release'
        env:
          DEV_AR_IMAGE: ${{ env.REGION }}-docker.pkg.dev/liverty-music-dev/${{ env.REPOSITORY }}/${{ env.IMAGE }}
          PROD_AR_IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}
          DIGEST: ${{ steps.resolve_digest.outputs.digest }}
        run: |
          crane copy \
            "${DEV_AR_IMAGE}@${DIGEST}" \
            "${PROD_AR_IMAGE}:${GITHUB_SHA}"

  # Post-deploy smoke: hits the live URL and asserts the SPA renders
  # plus /config.json reports the expected environment. Closes the
  # gap left by section 5.5 of OpenSpec archive
  # `2026-05-16-adopt-runtime-config-for-frontend`: the smoke spec
  # existed but ran only on demand.
  #
  # Path matrix:
  #   - push to main      -> wait for ArgoCD Image Updater to pick up
  #                          dev AR :latest, then smoke dev URL
  #   - release published -> SKIP (prod does not auto-deploy; the
  #                          pin-bump PR in cloud-provisioning is the
  #                          gate. Re-run this workflow via
  #                          workflow_dispatch after that PR merges to
  #                          smoke prod)
  #   - workflow_dispatch -> smoke whatever `smoke_url` is provided
  #                          (no build, no wait)
  post-deploy-smoke:
    needs: build-and-push
    # Skip if the upstream build failed/was skipped (e.g., release path
    # wants prod smoke deferred to the manual pin-bump).
    if: |
      always() &&
      ((github.event_name == 'push' && needs.build-and-push.result == 'success') ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Pick the target URL up-front and validate that it points at a
      # known production-tier hostname. The workflow_dispatch input
      # MUST NOT be interpolated directly into a `run:` shell — instead
      # we route it through the env block (single env var, no shell
      # parsing of the value) and then through a regex allowlist.
      - name: Pick smoke target URL
        id: target
        env:
          SMOKE_URL_INPUT: ${{ inputs.smoke_url }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            candidate="$SMOKE_URL_INPUT"
          else
            candidate="https://dev.liverty-music.app"
          fi
          # Allowlist: only the three known liverty-music hostnames.
          # Same map the SPA's KNOWN_HOSTS enforces at bootstrap.
          case "$candidate" in
            https://liverty-music.app|https://liverty-music.app/) ;;
            https://dev.liverty-music.app|https://dev.liverty-music.app/) ;;
            https://staging.liverty-music.app|https://staging.liverty-music.app/) ;;
            *)
              echo "::error::smoke_url not in allowlist: '$candidate'"
              exit 1
              ;;
          esac
          # Strip trailing slash for a canonical form.
          candidate="${candidate%/}"
          echo "url=$candidate" >> "$GITHUB_OUTPUT"

      # For the push-to-main path, the deploy is gated by ArgoCD Image
      # Updater scanning the AR `:latest` tag (typical poll interval
      # 60-180s). Build locally to learn the new bundle hash, then poll
      # the live URL until that hash surfaces. Confirms the deployed
      # image actually carries this PR's code (not the previous one).
      # workflow_dispatch skips this — the operator chose when to run.
      - name: Build to learn expected bundle hash
        if: github.event_name == 'push'
        run: npm run build

      - name: Wait for new bundle to surface at dev URL
        if: github.event_name == 'push'
        timeout-minutes: 8
        env:
          TARGET_URL: ${{ steps.target.outputs.url }}
        run: |
          expected_bundle=$(grep -oE 'assets/index-[A-Za-z0-9_-]+\.js' dist/index.html | head -1)
          if [ -z "$expected_bundle" ]; then
            echo "::error::Could not parse expected bundle hash from local dist/index.html"
            exit 1
          fi
          echo "Expected bundle: $expected_bundle"
          for attempt in $(seq 1 24); do
            # -f: fail on HTTP errors (503 during rollout, etc.) so we
            # log the actual problem instead of treating empty output
            # as "bundle not yet updated" for the full 8-minute window.
            http_body=$(curl -sSf "$TARGET_URL/" 2>&1) || {
              echo "Attempt $attempt/24: curl failed (${http_body:0:200}); retrying..."
              sleep 20
              continue
            }
            live_bundle=$(echo "$http_body" | grep -oE 'assets/index-[A-Za-z0-9_-]+\.js' | head -1)
            if [ "$live_bundle" = "$expected_bundle" ]; then
              echo "ArgoCD rollout complete after $((attempt * 20))s"
              exit 0
            fi
            echo "Attempt $attempt/24: live bundle is '$live_bundle', waiting..."
            sleep 20
          done
          echo "::error::Timed out waiting for $expected_bundle to surface at $TARGET_URL"
          exit 1

      - name: Run smoke against deployed URL
        env:
          SMOKE_BASE_URL: ${{ steps.target.outputs.url }}
        run: npm run test:smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-playwright-report
          path: |
            playwright-report/
            test-results/smoke/
          retention-days: 7
          if-no-files-found: ignore
