name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'test/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'vite.config.ts'
              - 'biome.json'
              - '.github/workflows/**'

  lint:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npx biome lint src test && npm run lint:css

      - name: Check formatting
        run: npx biome format src test

  lint-skip:
    needs: changes
    if: needs.changes.outputs.src == 'false'
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - run: echo "No relevant changes, skipping lint"

  typecheck:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npx tsc --noEmit

  typecheck-skip:
    needs: changes
    if: needs.changes.outputs.src == 'false'
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - run: echo "No relevant changes, skipping typecheck"

  test:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Report coverage on PR
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          json-summary-path: ./coverage/coverage-summary.json

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-skip:
    needs: changes
    if: needs.changes.outputs.src == 'false'
    name: Test
    runs-on: ubuntu-latest
    steps:
      - run: echo "No relevant changes, skipping tests"

  security:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --omit=dev --audit-level=moderate

  security-skip:
    needs: changes
    if: needs.changes.outputs.src == 'false'
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - run: echo "No relevant changes, skipping security audit"

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, lint-skip, typecheck, typecheck-skip, test, test-skip, security, security-skip]
    if: always()
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          allowed-skips: lint, lint-skip, typecheck, typecheck-skip, test, test-skip, security, security-skip
          jobs: ${{ toJSON(needs) }}
