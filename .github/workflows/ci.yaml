name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'test/**'
              - 'e2e/**'
              - 'index.html'
              - 'public/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'vite.config.ts'
              - 'vitest.config.ts'
              - 'biome.json'
              - '.stylelintrc.json'
              - 'Makefile'
              - 'playwright.config.mjs'
              - '.github/workflows/**'

  lint:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run make lint
        run: make lint

  lint-skip:
    needs: changes
    if: needs.changes.outputs.src == 'false'
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - run: echo "No relevant changes, skipping lint"

  test:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run make test
        run: make test

      - name: Report coverage on PR
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          json-summary-path: ./coverage/coverage-summary.json

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-skip:
    needs: changes
    if: needs.changes.outputs.src == 'false'
    name: Test
    runs-on: ubuntu-latest
    steps:
      - run: echo "No relevant changes, skipping tests"

  security:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --omit=dev --audit-level=moderate

  security-skip:
    needs: changes
    if: needs.changes.outputs.src == 'false'
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - run: echo "No relevant changes, skipping security audit"

  smoke:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    name: Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npx playwright test --project=smoke

      - name: Run onboarding tests
        run: npx playwright test --project=onboarding

  smoke-skip:
    needs: changes
    if: needs.changes.outputs.src == 'false'
    name: Smoke
    runs-on: ubuntu-latest
    steps:
      - run: echo "No relevant changes, skipping smoke tests"

  e2e:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --project=chromium

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-results
          path: test-results/
          retention-days: 7

  e2e-skip:
    needs: changes
    if: needs.changes.outputs.src == 'false'
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - run: echo "No relevant changes, skipping E2E tests"

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [changes, lint, lint-skip, test, test-skip, security, security-skip, smoke, smoke-skip, e2e, e2e-skip]
    if: always()
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          allowed-skips: lint, lint-skip, test, test-skip, security, security-skip, smoke, smoke-skip, e2e, e2e-skip
          jobs: ${{ toJSON(needs) }}
