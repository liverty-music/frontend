<import from="./coach-mark.css"></import>

<div
  ref="overlayEl"
  popover="manual"
  class="coach-mark-overlay"
>
  <div class="visual-spotlight" spotlight-radius.bind="spotlightRadius"></div>

  <div class="click-blocker mask-top" click.trigger="onBlockerClick()"></div>
  <div class="click-blocker mask-right" click.trigger="onBlockerClick()"></div>
  <div class="click-blocker mask-bottom" click.trigger="onBlockerClick()"></div>
  <div class="click-blocker mask-left" click.trigger="onBlockerClick()"></div>
  <div class="click-blocker target-interceptor" click.trigger="onTargetClick($event)"></div>

  <div class="coach-mark-tooltip">
    <div class="coach-arrow-container coach-arrow-above">
      <svg viewBox="0 0 100 100" fill="none" stroke="currentColor">
        <path class="arrow-line" d="M50,90 Q45,50 30,15" />
        <path class="arrow-head" d="M15,25 L30,15 L40,28" />
      </svg>
    </div>
    <p class="coach-tooltip-message">${message}</p>
    <div class="coach-arrow-container coach-arrow-below">
      <svg viewBox="0 0 100 100" fill="none" stroke="currentColor">
        <path class="arrow-line" d="M50,10 Q45,50 30,85" />
        <path class="arrow-head" d="M15,75 L30,85 L40,72" />
      </svg>
    </div>
  </div>
</div>
