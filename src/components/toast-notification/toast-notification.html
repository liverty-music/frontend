<import from="../icons/icon-ticket"></import>
<import from="./toast-notification.css"></import>

<div ref="containerElement" popover="manual" class="toast-popover fixed top-0 start-0 end-0 flex flex-col items-center gap-2 pt-4 pointer-events-none">
  <div
    repeat.for="toast of toasts; key.bind: toast.id"
    data-toast-id.bind="toast.id"
    role="status"
    class="toast-item flex items-center gap-2 px-5 py-3 bg-gradient-to-r ${severityClass(toast.severity)} backdrop-blur-sm text-white font-display font-semibold rounded-xl shadow-[var(--shadow-card-glow)] pointer-events-auto"
    data-state="${toast.visible ? 'entering' : 'exiting'}"
  >
    <icon-ticket if.bind="toast.severity === 'info'"></icon-ticket>
    <svg if.bind="toast.severity === 'warning'" class="w-5 h-5 shrink-0" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495zM10 6a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5A.75.75 0 0110 6zm0 9a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/>
    </svg>
    <svg if.bind="toast.severity === 'error'" class="w-5 h-5 shrink-0" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd"/>
    </svg>
    ${toast.message}
    <button
      if.bind="toast.action"
      click.trigger="onAction(toast)"
      class="ms-auto shrink-0 font-semibold uppercase tracking-wide text-sm text-white/90 hover:text-white transition-colors"
    >${toast.action.label}</button>
  </div>
</div>
