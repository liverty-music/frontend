<import from="./toast-notification.css"></import>

<div ref="containerElement" popover="manual" class="[ toast-popover ]">
  <div
    repeat.for="toast of toasts; key.bind: toast.id"
    data-toast-id.bind="toast.id"
    role="status"
    class="toast-item"
    data-severity.bind="toast.severity"
    data-state.bind="toastState(toast)"
  >
    <svg-icon if.bind="toast.severity === 'info'" name="ticket" class="toast-icon"></svg-icon>
    <svg-icon if.bind="toast.severity === 'warning'" name="warning" class="toast-icon"></svg-icon>
    <svg-icon if.bind="toast.severity === 'error'" name="x-circle" class="toast-icon"></svg-icon>
    ${toast.message}
    <button
      if.bind="toast.action"
      click.trigger="onAction(toast)"
      class="toast-action-btn"
    >${toast.action.label}</button>
  </div>
</div>
