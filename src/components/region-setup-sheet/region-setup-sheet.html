<dialog
  ref="dialogElement"
  aria-label="あなたのエリアを教えてください"
  click.trigger="handleBackdropClick($event)"
  class="region-setup-sheet"
>
  <div class="bg-surface-raised rounded-t-[var(--radius-sheet)] shadow-[var(--shadow-sheet)] max-h-[80vh] overflow-y-auto">
    <!-- Handle bar -->
    <div class="flex justify-center pt-3 pb-2">
      <div class="w-10 h-1 rounded-full bg-white/20"></div>
    </div>

    <div class="px-6 pb-8">
      <!-- Heading -->
      <h2 class="font-display text-xl font-bold text-text-primary mb-2">
        あなたのエリアを教えてください
      </h2>
      <p class="text-text-secondary text-sm mb-6">
        近くのライブイベントを見つけるために、お住まいの地域を選んでください。
      </p>

      <!-- Quick-select cities -->
      <div class="mb-6">
        <p class="text-text-muted text-xs font-semibold uppercase tracking-wider mb-3">主要都市</p>
        <div class="grid grid-cols-3 gap-2">
          <button
            repeat.for="city of quickCities"
            click.trigger="selectQuickCity(city)"
            class="py-2.5 px-3 bg-surface-overlay hover:bg-brand-primary/20 text-text-primary font-display font-semibold text-sm rounded-[var(--radius-button)] border border-white/10 hover:border-brand-primary/40 transition-colors"
          >
            ${city}
          </button>
        </div>
      </div>

      <!-- Prefecture dropdown -->
      <div>
        <p class="text-text-muted text-xs font-semibold uppercase tracking-wider mb-3">都道府県から選ぶ</p>
        <div class="flex gap-3">
          <select
            value.bind="selectedPrefecture"
            class="flex-1 py-2.5 px-3 bg-surface-overlay text-text-primary rounded-[var(--radius-button)] border border-white/10 focus:border-brand-accent focus:outline-none text-sm appearance-none"
          >
            <option value="">選択してください</option>
            <option repeat.for="pref of prefectures" value.bind="pref">${pref}</option>
          </select>
          <button
            click.trigger="selectPrefecture()"
            disabled.bind="!selectedPrefecture"
            class="py-2.5 px-5 bg-brand-primary hover:bg-brand-secondary disabled:opacity-40 disabled:cursor-not-allowed text-white font-semibold text-sm rounded-[var(--radius-button)] transition-colors shadow-[var(--shadow-button)]"
          >
            決定
          </button>
        </div>
      </div>
    </div>
  </div>
</dialog>
