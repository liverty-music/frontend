<dialog
  ref="dialogElement"
  t="[aria-label]region.title"
  click.trigger="handleBackdropClick($event)"
  class="region-setup-sheet"
>
  <div class="bg-surface-raised rounded-t-[var(--radius-sheet)] shadow-[var(--shadow-sheet)] max-h-[80vh] overflow-y-auto">
    <!-- Handle bar -->
    <div class="flex justify-center pt-3 pb-2">
      <div class="w-10 h-1 rounded-full bg-white/20"></div>
    </div>

    <div class="px-6 pb-8">
      <!-- Heading -->
      <h2 t="region.title" class="font-display text-xl font-bold text-text-primary mb-2"></h2>
      <p t="region.description" class="text-text-secondary text-sm mb-6"></p>

      <!-- Quick-select cities -->
      <div class="mb-6">
        <p t="region.majorCities" class="text-text-muted text-xs font-semibold uppercase tracking-wider mb-3"></p>
        <div class="grid grid-cols-3 gap-2">
          <button
            repeat.for="city of quickCities; key.bind: city.code"
            click.trigger="selectQuickCity(city.code)"
            class="py-2.5 px-3 bg-surface-overlay hover:bg-brand-primary/20 text-text-primary font-display font-semibold text-sm rounded-[var(--radius-button)] border border-white/10 hover:border-brand-primary/40 transition-colors"
          >
            ${trCity(city.key)}
          </button>
        </div>
      </div>

      <!-- Prefecture dropdown -->
      <div>
        <p t="region.selectByPrefecture" class="text-text-muted text-xs font-semibold uppercase tracking-wider mb-3"></p>
        <div class="flex gap-3">
          <select
            value.bind="selectedCode"
            class="flex-1 py-2.5 px-3 bg-surface-overlay text-text-primary rounded-[var(--radius-button)] border border-white/10 focus:border-brand-accent focus:outline-none text-sm appearance-none"
          >
            <option value="" t="region.placeholder"></option>
            <option repeat.for="pref of prefectures; key.bind: pref.code" value.bind="pref.code">${trPrefecture(pref.key)}</option>
          </select>
          <button
            click.trigger="selectPrefecture()"
            disabled.bind="!selectedCode"
            t="region.confirm"
            class="py-2.5 px-5 bg-brand-primary hover:bg-brand-secondary disabled:opacity-40 disabled:cursor-not-allowed text-white font-semibold text-sm rounded-[var(--radius-button)] transition-colors shadow-[var(--shadow-button)]"
          ></button>
        </div>
      </div>
    </div>
  </div>
</dialog>
