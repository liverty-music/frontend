<nav class="[ nav-bar ]">
  <a
    repeat.for="tab of tabs; key.bind: tab.path"
    href.bind="tab.path"
    data-nav.bind="tab.icon"
    class="nav-tab"
    data-active.bind="isActive(tab.path)"
  >
    <svg-icon name.bind="tab.icon" class="nav-icon"></svg-icon>
    <span class="nav-label" t.bind="tab.labelKey"></span>
  </a>
</nav>
