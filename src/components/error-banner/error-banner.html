<import from="./error-banner.css"></import>

<dialog
  ref="dialogElement"
  class="error-dialog"
>
  <div class="error-content">
    <h2 class="error-title">Something went wrong</h2>
    <p class="error-message">${errorBoundary.currentError?.message}</p>

    <div class="error-id-box">
      <span class="error-id">${errorBoundary.currentError?.id}</span>
    </div>

    <div class="error-actions">
      <button
        click.trigger="copyErrorDetails()"
        class="error-btn"
      >
        Copy Details
      </button>
      <button
        click.trigger="reportToGitHub()"
        class="error-btn"
      >
        Report to GitHub
      </button>
      <button
        click.trigger="dismiss()"
        class="error-btn"
        data-variant="muted"
      >
        Dismiss
      </button>
      <button
        click.trigger="reload()"
        class="error-btn"
        data-variant="primary"
      >
        Reload Page
      </button>
    </div>
  </div>
</dialog>
