<import from="./error-banner.css"></import>

<dialog
  ref="dialogElement"
  class="error-dialog"
>
  <div class="bg-surface-raised border border-white/10 rounded-2xl max-w-md w-full p-6 shadow-2xl">
    <h2 class="font-display text-lg font-bold text-text-primary mb-1">Something went wrong</h2>
    <p class="text-sm text-text-secondary mb-3">${errorBoundary.currentError?.message}</p>

    <div class="flex items-center gap-2 mb-4 px-3 py-2 bg-white/5 rounded-lg">
      <span class="text-xs text-text-muted font-mono">${errorBoundary.currentError?.id}</span>
    </div>

    <div class="grid grid-cols-2 gap-2">
      <button
        click.trigger="copyErrorDetails()"
        class="text-xs px-3 py-2 rounded-lg border border-white/10 hover:border-white/20 text-text-secondary hover:text-text-primary transition-colors"
      >
        Copy Details
      </button>
      <button
        click.trigger="reportToGitHub()"
        class="text-xs px-3 py-2 rounded-lg border border-white/10 hover:border-white/20 text-text-secondary hover:text-text-primary transition-colors"
      >
        Report to GitHub
      </button>
      <button
        click.trigger="dismiss()"
        class="text-xs px-3 py-2 rounded-lg border border-white/10 hover:border-white/20 text-text-muted hover:text-text-secondary transition-colors"
      >
        Dismiss
      </button>
      <button
        click.trigger="reload()"
        class="text-xs px-3 py-2 rounded-lg bg-brand-primary/20 border border-brand-primary/30 text-text-primary hover:bg-brand-primary/30 transition-colors"
      >
        Reload Page
      </button>
    </div>
  </div>
</dialog>
