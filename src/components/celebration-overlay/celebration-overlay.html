<template>
  <import from="./celebration-overlay.css"></import>

  <output
    role="status"
    aria-live="polite"
    class="[ celebration-overlay ]"
    data-state.bind="overlayState"
    click.trigger="onTap()"
    pointerdown.trigger="onTap()"
  >
    <div class="confetti-container">
      <div class="confetti" repeat.for="i of 30"></div>
    </div>
    <p class="celebration-text">${message}</p>
    <p class="celebration-sub-text" if.bind="subMessage">${subMessage}</p>
  </output>
</template>
