<import from="./hype-notification-dialog.css"></import>

<bottom-sheet open.bind="active" sheet-closed.trigger="onDismiss()">
  <section class="notification-content">
    <h2 class="notification-title">&#x1F514; ライブ通知について</h2>

    <ul class="notification-tiers">
      <li>&#x1F440; 通知なし</li>
      <li>&#x1F525; 地元のライブを通知</li>
      <li>&#x1F525;&#x1F525; 近くのライブも通知</li>
      <li>&#x1F525;&#x1F525;&#x1F525; 全国のライブを通知</li>
    </ul>

    <p class="notification-note">通知を受け取るにはアカウント登録が必要です</p>

    <footer class="notification-actions">
      <button class="notification-btn-primary" click.trigger="onSignup()">アカウント作成</button>
      <button class="notification-btn-ghost" click.trigger="onDismiss()">あとで</button>
    </footer>
  </section>
</bottom-sheet>
