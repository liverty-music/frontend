<import from="./post-signup-dialog.css"></import>

<bottom-sheet open.bind="isOpen" t="[aria-label]postSignup.ariaLabel" sheet-closed.trigger="onDefer()">
  <section class="post-signup-content">
    <h2 class="post-signup-title" t="postSignup.title"></h2>
    <p class="post-signup-subtitle" t="postSignup.subtitle"></p>

    <!-- Notification opt-in row -->
    <div class="post-signup-row" if.bind="notificationManager.permission === 'default'">
      <span class="post-signup-row-icon">🔔</span>
      <div class="post-signup-row-body">
        <p class="post-signup-row-label" t="postSignup.notificationLabel"></p>
        <button
          type="button"
          class="post-signup-btn"
          busy-on-click.bind="() => onEnableNotifications()"
          disabled.bind="notificationDone"
        >
          <span if.bind="notificationDone" t="postSignup.notificationEnabled"></span>
          <span else t="postSignup.notificationEnable"></span>
        </button>
        <p if.bind="notificationError" class="post-signup-error" t="postSignup.notificationError"></p>
      </div>
    </div>

    <!-- Notification denied state -->
    <div class="post-signup-row" if.bind="notificationManager.permission === 'denied'">
      <span class="post-signup-row-icon">🔕</span>
      <div class="post-signup-row-body">
        <p class="post-signup-row-label" t="postSignup.notificationDenied"></p>
      </div>
    </div>

    <!-- PWA install row (shown whenever the browser supports PWA install) -->
    <div class="post-signup-row" if.bind="canInstallPwa">
      <span class="post-signup-row-icon">📱</span>
      <div class="post-signup-row-body">
        <p class="post-signup-row-label" t="postSignup.pwaLabel"></p>
        <!-- Native one-tap install when the deferred prompt is available -->
        <button
          if.bind="canInstallNatively"
          type="button"
          class="post-signup-btn"
          busy-on-click.bind="() => onInstallPwa()"
          t="postSignup.pwaInstall"
        ></button>
        <!-- Fallback: native disclosure of manual install steps (no JS state) -->
        <details if.bind="!canInstallNatively" class="post-signup-install-guide">
          <summary class="post-signup-btn" t="postSignup.pwaInstallGuide"></summary>
          <ol class="post-signup-install-steps">
            <li t="postSignup.pwaGuideStep1"></li>
            <li t="postSignup.pwaGuideStep2"></li>
            <li t="postSignup.pwaGuideStep3"></li>
          </ol>
        </details>
      </div>
    </div>

    <footer class="post-signup-footer">
      <button
        type="button"
        class="post-signup-btn-ghost"
        click.trigger="onDefer()"
        t.bind="isAllDone ? 'postSignup.close' : 'postSignup.defer'"
      ></button>
    </footer>
  </section>
</bottom-sheet>
