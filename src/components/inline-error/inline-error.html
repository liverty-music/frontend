<div class="flex flex-col items-center justify-center py-12 px-4 text-center">
  <svg class="w-10 h-10 text-text-muted mb-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"></circle>
    <line x1="12" y1="8" x2="12" y2="12"></line>
    <line x1="12" y1="16" x2="12.01" y2="16"></line>
  </svg>
  <p class="text-sm text-text-secondary mb-1">${message}</p>
  <p class="text-xs text-text-muted mb-4">${errorMessage}</p>
  <button
    if.bind="retryAction"
    click.trigger="retry()"
    class="text-xs px-4 py-2 rounded-lg border border-white/10 hover:border-white/20 text-text-secondary hover:text-text-primary transition-colors"
  >
    Retry
  </button>
</div>
