<div class="[ inline-error-layout ]">
  <svg class="inline-error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"></circle>
    <line x1="12" y1="8" x2="12" y2="12"></line>
    <line x1="12" y1="16" x2="12.01" y2="16"></line>
  </svg>
  <p class="inline-error-message">${message}</p>
  <p class="inline-error-detail">${errorMessage}</p>
  <button
    if.bind="retryAction"
    click.trigger="retry()"
    class="inline-error-retry"
  >
    Retry
  </button>
</div>
