<import from="./legal-document.css"></import>

<article class="[ legal-document ] [ flow ]">
  <!-- DRAFT marker. Stays until a legal professional signs off (see the
       add-legal-documents change, task 5.1). Remove this banner only when the
       reviewed final text replaces the draft. -->
  <p class="legal-draft-banner" role="note" t="legal.draftBanner"></p>

  <header class="[ legal-header ] [ flow ]">
    <h1 class="legal-title" t.bind="titleKey"></h1>
    <p class="legal-updated">
      <span t="legal.lastUpdatedLabel"></span>
      <span t.bind="lastUpdatedKey"></span>
    </p>
  </header>

  <p class="legal-intro" t.bind="introKey"></p>

  <section
    class="[ legal-section ] [ flow ]"
    repeat.for="section of sections & signal: 'aurelia-translation-signal'"
  >
    <h2 class="legal-section-heading">${section.heading}</h2>
    <p
      class="legal-section-body"
      repeat.for="paragraph of section.body"
    >${paragraph}</p>
  </section>
</article>
