<!-- Backdrop -->
<div
  if.bind="isOpen"
  click.trigger="close()"
  class="fixed inset-0 z-40 bg-black/60 backdrop-blur-sm transition-opacity duration-300"
></div>

<!-- Sheet -->
<div
  ref="sheetElement"
  tabindex="-1"
  role="dialog"
  aria-label="Change My Area"
  inert.bind="!isOpen"
  class="fixed inset-x-0 bottom-0 z-50 transition-transform duration-300 ease-out ${isOpen ? 'translate-y-0' : 'translate-y-full'}"
>
  <div class="bg-surface-raised rounded-t-[var(--radius-sheet)] shadow-[var(--shadow-sheet)] max-h-[80vh] overflow-y-auto">
    <!-- Handle bar -->
    <div class="flex justify-center pt-3 pb-2">
      <div class="w-10 h-1 rounded-full bg-white/20"></div>
    </div>

    <div class="px-6 pb-8">
      <!-- Step 1: Region selection -->
      <template if.bind="!selectedRegion">
        <h2 class="font-display text-xl font-bold text-text-primary mb-2">
          Change My Area
        </h2>
        <p class="text-text-secondary text-sm mb-6">
          Select a region to find prefectures near you.
        </p>

        <div class="grid grid-cols-3 gap-2">
          <button
            repeat.for="region of regions"
            click.trigger="selectRegion(region)"
            class="py-3 px-3 bg-surface-overlay hover:bg-brand-primary/20 text-text-primary font-display font-semibold text-sm rounded-[var(--radius-button)] border border-white/10 hover:border-brand-primary/40 transition-colors"
          >
            ${region.name}
          </button>
        </div>
      </template>

      <!-- Step 2: Prefecture selection -->
      <template if.bind="selectedRegion">
        <div class="flex items-center gap-3 mb-2">
          <button
            click.trigger="backToRegions()"
            aria-label="Back to regions"
            class="flex items-center justify-center w-8 h-8 rounded-full bg-surface-overlay hover:bg-white/10 transition-colors"
          >
            <svg class="w-4 h-4 text-text-secondary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 18l-6-6 6-6"></path>
            </svg>
          </button>
          <h2 class="font-display text-xl font-bold text-text-primary">
            ${selectedRegion.name}
          </h2>
        </div>
        <p class="text-text-secondary text-sm mb-6">
          Select your prefecture.
        </p>

        <div class="grid grid-cols-3 gap-2">
          <button
            repeat.for="pref of selectedRegion.prefectures"
            click.trigger="selectPrefecture(pref)"
            class="py-3 px-3 bg-surface-overlay hover:bg-brand-primary/20 text-text-primary font-display font-semibold text-sm rounded-[var(--radius-button)] border border-white/10 hover:border-brand-primary/40 transition-colors"
          >
            ${pref}
          </button>
        </div>
      </template>
    </div>
  </div>
</div>
