<template>
  <import from="./event-detail-sheet.css"></import>

  <!-- <dialog> with dynamic popover mode set in open():
       - popover="auto" (normal): free light dismiss (Escape, click-outside, Android back)
       - popover="manual" (onboarding Step 4): non-dismissible, coach mark on top -->
  <dialog
    ref="sheetElement"
    tabindex="-1"
    aria-label="Event details"
    class="[ event-detail-sheet ]"
  >
    <!-- Fullscreen scroll snap: two 100dvh pages give the snap engine clear targets -->
    <div
      ref="scrollWrapper"
      scroll.trigger="onScroll($event)"
      scrollend.trigger="onScrollEnd($event)"
      class="sheet-scroll"
    >
      <!-- Page 1: swipe down scrolls here to dismiss -->
      <div if.bind="isDismissable" class="snap-page dismiss-zone"></div>

      <!-- Page 2: flex-end pins card to viewport bottom; click on transparent area dismisses -->
      <div click.trigger="onBackdropClick()" class="snap-page sheet-page">
        <article click.trigger="$event.stopPropagation()" class="sheet-body">
          <div class="sheet-handle-bar"></div>

          <section if.bind="event" class="sheet-content">
            <!-- Hero background image -->
            <figure if.bind="event.backgroundUrl" class="sheet-hero">
              <img
                src.bind="event.backgroundUrl"
                alt=""
                loading="lazy"
                decoding="async"
                class="sheet-hero-img"
              />
            </figure>

            <!-- Artist name header with dynamic color -->
            <header
              artist-color.bind="event.artistName"
              class="sheet-artist-header hype-home"
            >
              <h2 class="sheet-artist-name">
                ${event.artistName}
              </h2>
              <p class="sheet-event-title">${event.title}</p>
            </header>

            <!-- Event details -->
            <section class="sheet-details">
              <!-- Date & Time -->
              <div class="detail-row">
                <span class="detail-icon"><svg-icon name="calendar"></svg-icon></span>
                <div>
                  <time datetime.bind="event.date.toISOString()" class="detail-primary">${event.date | date:'long'}</time>
                  <p class="detail-secondary">
                    Open ${event.openTime || '—'} / Start ${event.startTime}
                  </p>
                </div>
              </div>

              <!-- Venue -->
              <div class="detail-row">
                <span class="detail-icon"><svg-icon name="map-pin"></svg-icon></span>
                <div>
                  <p class="detail-primary">${event.venueName}</p>
                  <p if.bind="event.adminArea" class="detail-secondary">${event.adminArea}</p>
                  <a
                    href.bind="googleMapsUrl"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="detail-link"
                  >
                    Open in Google Maps
                  </a>
                </div>
              </div>
            </section>

            <!-- Action buttons -->
            <footer class="sheet-actions">
              <a
                href.bind="event.sourceUrl"
                target="_blank"
                rel="noopener noreferrer"
                class="sheet-btn-primary"
              >
                <svg-icon name="link"></svg-icon> View Official Info
              </a>
              <a
                href.bind="calendarUrl"
                target="_blank"
                rel="noopener noreferrer"
                class="sheet-btn-secondary"
              >
                <svg-icon name="calendar"></svg-icon> Add to Calendar
              </a>
            </footer>
          </section>
        </article>
      </div>
    </div>
  </dialog>
</template>
