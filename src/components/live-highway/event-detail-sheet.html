<template>
  <import from="../icons/icon-calendar"></import>
  <import from="../icons/icon-map-pin"></import>
  <import from="../icons/icon-link"></import>
  <import from="./event-detail-sheet.css"></import>

  <!-- Backdrop overlay (popover="manual" does not generate ::backdrop) -->
  <div
    class="event-detail-backdrop ${isOpen ? 'is-visible' : ''}"
    click.trigger="onBackdropTap()"
  ></div>

  <div
    ref="sheetElement"
    popover="manual"
    role="dialog"
    aria-label="Event details"
    click.trigger="onBackdropClick($event)"
    touchstart.trigger="onTouchStart($event)"
    touchmove.trigger="onTouchMove($event)"
    touchend.trigger="onTouchEnd()"
    class="event-detail-sheet"
    style="transform: ${dragOffset > 0 ? 'translateY(' + dragOffset + 'px)' : ''}"
  >
    <div
      click.trigger="onSheetClick($event)"
      class="bg-surface-raised rounded-t-[var(--radius-sheet)] shadow-[var(--shadow-sheet)] max-h-[70vh] overflow-y-auto"
    >
      <!-- Handle bar -->
      <div class="flex justify-center pt-3 pb-2">
        <div class="w-10 h-1 rounded-full bg-white/20"></div>
      </div>

      <div if.bind="event" class="px-6 pb-8">
        <!-- Artist name header with dynamic color -->
        <div
          style="background-color: ${backgroundColor}"
          class="rounded-[var(--radius-card)] p-5 mb-5"
        >
          <h2 class="text-white font-display font-extrabold text-2xl leading-tight">
            ${event.artistName}
          </h2>
          <p class="text-white/80 text-sm mt-1">${event.title}</p>
        </div>

        <!-- Event details -->
        <div class="space-y-4">
          <!-- Date & Time -->
          <div class="flex items-start gap-3">
            <span class="text-text-muted mt-0.5"><icon-calendar></icon-calendar></span>
            <div>
              <p class="text-text-primary font-medium">${event.date | date:'long'}</p>
              <p class="text-text-secondary text-sm">
                Open ${event.openTime || '—'} / Start ${event.startTime}
              </p>
            </div>
          </div>

          <!-- Venue -->
          <div class="flex items-start gap-3">
            <span class="text-text-muted mt-0.5"><icon-map-pin></icon-map-pin></span>
            <div>
              <p class="text-text-primary font-medium">${event.venueName}</p>
              <p if.bind="event.adminArea" class="text-text-secondary text-sm">${event.adminArea}</p>
              <a
                href.bind="googleMapsUrl"
                target="_blank"
                rel="noopener noreferrer"
                class="text-brand-accent text-sm hover:underline"
              >
                Open in Google Maps
              </a>
            </div>
          </div>
        </div>

        <!-- Action buttons -->
        <div class="mt-6 flex flex-col gap-3">
          <a
            href.bind="event.sourceUrl"
            target="_blank"
            rel="noopener noreferrer"
            class="flex items-center justify-center gap-2 py-3 px-4 bg-brand-primary hover:bg-brand-secondary text-white rounded-[var(--radius-button)] font-medium text-sm transition-colors shadow-[var(--shadow-button)]"
          >
            <icon-link></icon-link> View Official Info
          </a>
          <a
            href.bind="calendarUrl"
            target="_blank"
            rel="noopener noreferrer"
            class="flex items-center justify-center gap-2 py-3 px-4 border border-white/20 hover:border-white/40 text-text-secondary hover:text-text-primary rounded-[var(--radius-button)] font-medium text-sm transition-colors hover:bg-white/5"
          >
            <icon-calendar></icon-calendar> Add to Calendar
          </a>
        </div>
      </div>
    </div>
  </div>
</template>
