<template>
  <import from="./event-detail-sheet.css"></import>

  <bottom-sheet
    open.bind="isOpen"
    dismissable="true"
    sheet-closed.trigger="onSheetClosed()"
    t="[aria-label]eventDetail.ariaLabel"
  >
    <div if.bind="event" class="sheet-content" aria-labelledby="sheet-artist-name">
      <!-- Hero background image -->
      <div if.bind="backgroundUrl" class="sheet-hero" role="presentation">
        <img
          src.bind="backgroundUrl"
          alt=""
          loading="lazy"
          decoding="async"
          class="sheet-hero-img"
        />
      </div>

      <!-- Artist name header with dynamic color -->
      <header
        artist-color.bind="event.artistName"
        class="sheet-artist-header hype-home"
      >
        <h2 id="sheet-artist-name" class="sheet-artist-name">
          ${event.artistName}
        </h2>
        <p class="sheet-event-title">${event.title}</p>
      </header>

      <!-- Event details -->
      <section class="sheet-details">
        <!-- Date & Time -->
        <div class="detail-row">
          <span class="detail-icon"><svg-icon name="calendar"></svg-icon></span>
          <div>
            <time datetime.bind="event.date.toISOString()" class="detail-primary">${event.date | date:'long'}</time>
            <p
              class="detail-secondary"
              t="eventDetail.openStart"
              t-params.bind="{ open: openTimeOrFallback, start: event.startTime }"
            ></p>
          </div>
        </div>

        <!-- Venue -->
        <div class="detail-row">
          <span class="detail-icon"><svg-icon name="map-pin"></svg-icon></span>
          <div>
            <p class="detail-primary">${event.venueName}</p>
            <p if.bind="event.locationLabel" class="detail-secondary">${event.locationLabel}</p>
            <a
              href.bind="googleMapsUrl"
              target="_blank"
              rel="noopener noreferrer"
              class="detail-link"
              t="eventDetail.openInGoogleMaps"
            ></a>
          </div>
        </div>
      </section>

      <!-- Ticket journey status -->
      <section if.bind="isAuthenticated" class="sheet-journey" data-testid="sheet-journey">
        <h3 id="journey-status-heading" class="journey-heading" t="eventDetail.ticketStatus"></h3>

        <div
          class="journey"
          role="radiogroup"
          aria-labelledby="journey-status-heading"
          keydown.trigger="onJourneyKeydown($event)"
        >
          <!-- (1) Application process: tracking -> applied -->
          <div class="journey-phase">
            <p class="journey-phase-label" t="eventDetail.journeyPhase.process"></p>
            <div class="journey-process">
              <button
                class="journey-node"
                role="radio"
                data-testid="journey-btn"
                data-journey-status="tracking"
                data-state.bind="nodeStates.tracking"
                aria-checked.bind="event.journeyStatus === 'tracking'"
                tabindex.bind="journeyTabindex('tracking')"
                disabled.bind="journeyUpdating"
                click.trigger="setJourneyStatus('tracking')"
              >
                <span class="journey-node-cue" aria-hidden="true">${journeyConfig.tracking.icon}</span>
                <span class="journey-node-label" t.bind="journeyConfig.tracking.labelKey"></span>
              </button>
              <span class="journey-arrow" aria-hidden="true"></span>
              <button
                class="journey-node"
                role="radio"
                data-testid="journey-btn"
                data-journey-status="applied"
                data-state.bind="nodeStates.applied"
                aria-checked.bind="event.journeyStatus === 'applied'"
                tabindex.bind="journeyTabindex('applied')"
                disabled.bind="journeyUpdating"
                click.trigger="setJourneyStatus('applied')"
              >
                <span class="journey-node-cue" aria-hidden="true">${journeyConfig.applied.icon}</span>
                <span class="journey-node-label" t.bind="journeyConfig.applied.labelKey"></span>
              </button>
            </div>
          </div>

          <!-- (2) Outcome: success route (top) and failure route (below) -->
          <div class="journey-phase" data-pending.bind="outcomePending || undefined">
            <p class="journey-phase-label">
              <span t="eventDetail.journeyPhase.outcome"></span>
              <span
                if.bind="outcomePending"
                class="journey-pending-tag"
                t="eventDetail.journeyPhase.pending"
              ></span>
            </p>

            <div class="journey-outcome">
              <!-- Win route: 当選 -> unpaid -> paid -->
              <div
                class="journey-route journey-route-success"
                data-dimmed.bind="successDimmed || undefined"
              >
                <p class="journey-route-label" t="eventDetail.journeyRoute.won"></p>
                <button
                  class="journey-node"
                  role="radio"
                  data-testid="journey-btn"
                  data-journey-status="unpaid"
                  data-state.bind="nodeStates.unpaid"
                  aria-checked.bind="event.journeyStatus === 'unpaid'"
                  tabindex.bind="journeyTabindex('unpaid')"
                  disabled.bind="journeyUpdating"
                  click.trigger="setJourneyStatus('unpaid')"
                >
                  <span class="journey-node-cue" aria-hidden="true">${journeyConfig.unpaid.icon}</span>
                  <span class="journey-node-label" t.bind="journeyConfig.unpaid.labelKey"></span>
                </button>
                <span class="journey-arrow journey-arrow-down" aria-hidden="true"></span>
                <button
                  class="journey-node"
                  role="radio"
                  data-testid="journey-btn"
                  data-journey-status="paid"
                  data-state.bind="nodeStates.paid"
                  aria-checked.bind="event.journeyStatus === 'paid'"
                  tabindex.bind="journeyTabindex('paid')"
                  disabled.bind="journeyUpdating"
                  click.trigger="setJourneyStatus('paid')"
                >
                  <span class="journey-node-cue" aria-hidden="true">${journeyConfig.paid.icon}</span>
                  <span class="journey-node-label" t.bind="journeyConfig.paid.labelKey"></span>
                </button>
              </div>

              <!-- Lose route: lost -->
              <div
                class="journey-route journey-route-failure"
                data-dimmed.bind="failureDimmed || undefined"
              >
                <button
                  class="journey-node"
                  role="radio"
                  data-testid="journey-btn"
                  data-journey-status="lost"
                  data-state.bind="nodeStates.lost"
                  aria-checked.bind="event.journeyStatus === 'lost'"
                  tabindex.bind="journeyTabindex('lost')"
                  disabled.bind="journeyUpdating"
                  click.trigger="setJourneyStatus('lost')"
                >
                  <span class="journey-node-cue" aria-hidden="true">${journeyConfig.lost.icon}</span>
                  <span class="journey-node-label" t.bind="journeyConfig.lost.labelKey"></span>
                </button>
              </div>
            </div>
          </div>
        </div>

        <button
          if.bind="event.journeyStatus"
          class="journey-remove-btn" data-testid="journey-remove-btn"
          disabled.bind="journeyUpdating"
          click.trigger="removeJourney()"
          t="eventDetail.stopTracking"
        ></button>
      </section>

      <!-- Action buttons -->
      <footer class="sheet-actions">
        <a
          href.bind="event.sourceUrl"
          target="_blank"
          rel="noopener noreferrer"
          class="sheet-btn-primary"
        >
          <svg-icon name="link"></svg-icon>
          <span t="eventDetail.viewOfficialInfo"></span>
        </a>
        <a
          if.bind="hasMerchUrl"
          href.bind="event.merchUrl"
          target="_blank"
          rel="noopener noreferrer"
          class="sheet-btn-secondary"
          data-testid="merch-link"
        >
          <svg-icon name="link"></svg-icon>
          <span t="eventDetail.viewMerch"></span>
        </a>
        <a
          href.bind="calendarUrl"
          target="_blank"
          rel="noopener noreferrer"
          class="sheet-btn-secondary"
        >
          <svg-icon name="calendar"></svg-icon>
          <span t="eventDetail.addToCalendar"></span>
        </a>
      </footer>
    </div>
  </bottom-sheet>
</template>
