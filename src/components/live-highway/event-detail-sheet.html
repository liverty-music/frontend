<template>
  <import from="../icons/icon-calendar"></import>
  <import from="../icons/icon-map-pin"></import>
  <import from="../icons/icon-link"></import>
  <import from="./event-detail-sheet.css"></import>

  <!-- <dialog> with dynamic popover mode set in open():
       - popover="auto" (normal): free light dismiss (Escape, click-outside, Android back)
       - popover="manual" (onboarding Step 4): non-dismissible, coach mark on top -->
  <dialog
    ref="sheetElement"
    tabindex="-1"
    aria-label="Event details"
    touchstart.trigger="onTouchStart($event)"
    touchmove.trigger="onTouchMove($event)"
    touchend.trigger="onTouchEnd()"
    class="[ event-detail-sheet ]"
    drag-offset.bind="dragOffset"
  >
    <div
      click.trigger="onSheetClick($event)"
      class="sheet-body"
    >
      <!-- Handle bar -->
      <div class="sheet-handle">
        <div class="sheet-handle-bar"></div>
      </div>

      <div if.bind="event" class="sheet-content">
        <!-- Artist name header with dynamic color -->
        <div
          artist-color.bind="event.artistName"
          class="sheet-artist-header hype-home"
        >
          <h2 class="sheet-artist-name">
            ${event.artistName}
          </h2>
          <p class="sheet-event-title">${event.title}</p>
        </div>

        <!-- Event details -->
        <div class="sheet-details">
          <!-- Date & Time -->
          <div class="detail-row">
            <span class="detail-icon"><icon-calendar></icon-calendar></span>
            <div>
              <time datetime.bind="event.date.toISOString()" class="detail-primary">${event.date | date:'long'}</time>
              <p class="detail-secondary">
                Open ${event.openTime || '—'} / Start ${event.startTime}
              </p>
            </div>
          </div>

          <!-- Venue -->
          <div class="detail-row">
            <span class="detail-icon"><icon-map-pin></icon-map-pin></span>
            <div class="detail-venue">
              <p class="detail-primary">${event.venueName}</p>
              <p if.bind="event.adminArea" class="detail-secondary">${event.adminArea}</p>
              <a
                href.bind="googleMapsUrl"
                target="_blank"
                rel="noopener noreferrer"
                class="detail-link"
              >
                Open in Google Maps
              </a>
            </div>
          </div>
        </div>

        <!-- Action buttons -->
        <div class="sheet-actions">
          <a
            href.bind="event.sourceUrl"
            target="_blank"
            rel="noopener noreferrer"
            class="sheet-btn-primary"
          >
            <icon-link></icon-link> View Official Info
          </a>
          <a
            href.bind="calendarUrl"
            target="_blank"
            rel="noopener noreferrer"
            class="sheet-btn-secondary"
          >
            <icon-calendar></icon-calendar> Add to Calendar
          </a>
        </div>
      </div>
    </div>
  </dialog>
</template>
