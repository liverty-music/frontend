<template>
  <import from="./event-card.css"></import>

  <article
    data-live-card
    data-lane.bind="lane"
    click.trigger="onClick()"
    keydown.trigger="$event.key === ' ' ? (onClick(), $event.preventDefault()) : null"
    role="button"
    tabindex="0"
    artist-color.bind="event.artistName"
    class="[ event-card ]"
    data-hype.bind="event.hypeLevel"
  >
    <span class="artist-name">
      ${event.artistName}
    </span>
    <span if.bind="lane !== 'home'" class="location-label">
      ${event.locationLabel}
    </span>
  </article>
</template>
