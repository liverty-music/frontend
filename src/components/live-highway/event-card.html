<template>
  <import from="./event-card.css"></import>

  <div
    data-live-card
    data-lane.bind="lane"
    click.trigger="onClick()"
    artist-color.bind="event.artistName"
    class="event-card"
    data-hype.bind="event.hypeLevel"
  >
    <span class="artist-name">
      ${event.artistName}
    </span>
    <span if.bind="lane !== 'home'" class="location-label">
      ${event.locationLabel}
    </span>
  </div>
</template>
