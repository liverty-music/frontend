<template>
  <import from="./event-card.css"></import>

  <article
    data-live-card
    data-lane.bind="lane"
    data-matched.bind="event.matched || undefined"
    click.trigger="onClick()"
    keydown.trigger="handleKeydown($event)"
    role="button"
    tabindex="0"
    artist-color.bind="event.artistName"
    profile.bind="event.logoColorProfile"
    data-beam-index.bind="beamIndex"
    class="[ event-card ]"
  >
    <img
      if.bind="event.logoUrl && !logoError"
      src.bind="event.logoUrl"
      alt.bind="event.artistName"
      loading="lazy"
      decoding="async"
      error.trigger="onLogoError()"
      class="artist-logo"
    />
    <span else class="artist-name">
      ${event.artistName}
    </span>
    <span if.bind="lane !== 'home'" class="location-label">
      ${event.locationLabel}
    </span>
  </article>
</template>
