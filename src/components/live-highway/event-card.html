<template>
  <import from="./event-card.css"></import>

  <article
    data-live-card
    data-lane.bind="lane"
    data-matched.bind="event.matched || undefined"
    click.trigger="onClick()"
    keydown.trigger="handleKeydown($event)"
    role="button"
    tabindex="0"
    artist-color.bind="event.artistName"
    data-beam-index.bind="beamIndex"
class="[ event-card ]"
  >
    <span class="artist-name">
      ${event.artistName}
    </span>
    <span if.bind="lane !== 'home'" class="location-label">
      ${event.locationLabel}
    </span>
    <span
      if.bind="event.journeyStatus"
      data-journey-status.bind="event.journeyStatus"
      class="journey-badge"
    >${event.journeyStatus}</span>
  </article>
</template>
