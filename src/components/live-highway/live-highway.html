<template>
  <import from="./event-card"></import>
  <import from="./event-detail-sheet"></import>

  <div event-selected.trigger="onEventSelected($event)" class="[ highway-layout ]">
    <!-- Loading state -->
    <div if.bind="loading" class="highway-loading">
      <p class="highway-loading-text">Loading events...</p>
    </div>

    <!-- Empty state -->
    <div if.bind="!loading && isEmpty" class="highway-empty">
      <p class="highway-empty-title">No upcoming events</p>
      <p class="highway-empty-message">Follow more artists to see their upcoming concerts here.</p>
    </div>

    <!-- Highway layout -->
    <template if.bind="!loading && !isEmpty">
      <!-- Stage header (outside scroll container — no sticky/z-index needed) -->
      <header class="[ stage-header ]">
        <div data-stage-home class="stage-label">
          <span class="stage-label-text">HOME STAGE</span>
        </div>
        <div data-stage-near class="stage-label">
          <span class="stage-label-text">NEAR STAGE</span>
        </div>
        <div data-stage-away class="stage-label">
          <span class="stage-label-text">AWAY STAGE</span>
        </div>
      </header>

      <div class="highway-scroll">
        <div repeat.for="group of dateGroups; key.bind: group.dateKey">
          <!-- Sticky date separator -->
          <header class="[ date-separator ]">
            <span class="date-separator-text">${group.label}</span>
          </header>

          <!-- Three-lane grid -->
          <div class="lane-grid">
            <!-- Home lane -->
            <div class="lane">
              <event-card
                repeat.for="ev of group.home; key.bind: ev.id"
                event.bind="ev"
                lane="home"
              ></event-card>
              <div if.bind="group.home.length === 0" class="lane-empty">
                <p class="lane-empty-dash">—</p>
              </div>
            </div>

            <!-- Nearby lane -->
            <div class="lane">
              <event-card
                repeat.for="ev of group.nearby; key.bind: ev.id"
                event.bind="ev"
                lane="nearby"
              ></event-card>
              <div if.bind="group.nearby.length === 0" class="lane-empty">
                <p class="lane-empty-dash">—</p>
              </div>
            </div>

            <!-- Away lane -->
            <div class="lane">
              <event-card
                repeat.for="ev of group.away; key.bind: ev.id"
                event.bind="ev"
                lane="away"
              ></event-card>
              <div if.bind="group.away.length === 0" class="lane-empty">
                <p class="lane-empty-dash">—</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- Bottom sheet (outside scroll container) -->
  <event-detail-sheet component.ref="detailSheet"></event-detail-sheet>
</template>
