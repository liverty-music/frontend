<template>
  <div ref="popoverEl" popover="manual"
    class="[ prompt-popover ]" data-animation.bind="animationState"
    data-testid="pwa-install-banner">
    <div class="prompt-row">
      <div class="prompt-icon-wrap" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
      </div>
      <div class="prompt-body">
        <p t="pwa.title" class="prompt-title"></p>
        <p t="pwa.description" class="prompt-desc"></p>
        <div class="prompt-actions">
          <button click.trigger="handleDismiss()"
            t="pwa.notNow"
            class="prompt-btn-secondary"
            data-testid="pwa-install-dismiss">
          </button>
          <button click.trigger="handleInstall()"
            t="pwa.install"
            class="prompt-btn-primary"
            data-testid="pwa-install-button">
          </button>
        </div>
      </div>
    </div>
  </div>
</template>
