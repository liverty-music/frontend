<div class="flex items-center gap-3">
  <div if.bind="auth.isAuthenticated" class="flex items-center gap-3">
    <span class="text-sm text-text-secondary">${auth.user.profile.name || auth.user.profile.preferred_username || 'User'}</span>
    <button click.trigger="signOut()" class="text-sm text-text-muted hover:text-text-secondary px-3 py-1.5 rounded-[var(--radius-button)] border border-white/10 hover:border-white/20 transition-colors">
      Sign Out
    </button>
  </div>
  <div if.bind="!auth.isAuthenticated">
    <button click.trigger="signIn()" class="text-sm font-medium text-white bg-brand-primary hover:bg-brand-secondary px-4 py-1.5 rounded-[var(--radius-button)] transition-colors shadow-[var(--shadow-button)]">
      Sign In
    </button>
  </div>
</div>
