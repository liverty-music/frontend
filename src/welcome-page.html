<import from="./components/signup-modal/signup-modal"></import>

<div class="welcome-layout">
  <div class="welcome-content">
    <!-- Brand wordmark -->
    <p class="welcome-brand">
      Liverty Music
    </p>

    <!-- Hero copy -->
    <h1 t="welcome.hero.title" class="welcome-title"></h1>
    <p t="welcome.hero.subtitle" class="welcome-subtitle"></p>

    <!-- CTA buttons -->
    <div class="welcome-actions" if.bind="!showSignUpModal">
      <!-- Primary: Get Started (new users / tutorial in progress) -->
      <button
        if.bind="showGetStarted"
        click.trigger="handleGetStarted()"
        class="welcome-btn-primary"
        t="welcome.cta.getStarted"
      ></button>

      <!-- Primary: Login (returning users with COMPLETED step) -->
      <button
        if.bind="!showGetStarted"
        click.trigger="handleLogin()"
        class="welcome-btn-primary"
        t="welcome.cta.login"
      ></button>

      <!-- Secondary: Login link (visible alongside Get Started for new users) -->
      <p if.bind="showGetStarted" class="welcome-login-hint">
        <a
          click.trigger="handleLogin()"
          class="welcome-login-link"
          t="welcome.cta.loginHint"
        ></a>
      </p>
    </div>

    <!-- Step 6: Non-dismissible SignUp modal -->
    <signup-modal active.bind="showSignUpModal"></signup-modal>
  </div>
</div>
