<template>
  <import from="../../components/dna-orb/dna-orb-canvas"></import>
  <import from="../../components/toast-notification/toast-notification"></import>

  <div class="container">
    <toast-notification></toast-notification>

    <!-- Canvas paints first (behind overlays) -->
    <dna-orb-canvas
      component.ref="dnaOrbCanvas"
      followed-count.bind="followedCount"
      artist-selected.trigger="onArtistSelected($event)"
      similar-artists-unavailable.trigger="onSimilarArtistsUnavailable($event)"
      similar-artists-error.trigger="onSimilarArtistsError($event)"
    ></dna-orb-canvas>

    <!-- Overlay layer — paints on top via DOM order, passes pointer events through -->
    <div class="overlay">
      <!-- Onboarding guidance + progress (unified cosmic pill) -->
      <div show.bind="isOnboarding" class="onboarding-hud">
        <!-- Orbital progress dots -->
        <div class="progress-dots">
          <span class="dot ${followedCount >= 1 ? 'filled' : ''}"></span>
          <span class="dot ${followedCount >= 2 ? 'filled' : ''}"></span>
          <span class="dot ${followedCount >= 3 ? 'filled' : ''}"></span>
        </div>

        <!-- Guidance message -->
        <p class="hud-message ${guidanceHiding ? 'hiding' : ''}">
          ${guidanceMessage}
        </p>
      </div>

      <!-- Orb label -->
      <div class="orb-label">
        ${$this.i18n?.tr('discovery.orbLabel') ?? 'Music DNA'} ${followedCount > 0 ? '· ' + followedCount : ''}
      </div>

      <div
        show.bind="showCompleteButton"
        class="complete-button-wrapper"
      >
        <button
          click.trigger="onViewSchedule()"
          class="complete-button ${isOnboarding ? 'tutorial-cta' : ''}"
        >
          ${isOnboarding ? $this.i18n?.tr('discovery.generateDashboard') ?? '' : $this.i18n?.tr('discovery.viewSchedule', { count: followedCount }) ?? ''}
        </button>
      </div>
    </div>

    <div
      role="status"
      aria-live="polite"
      class="sr-only"
    >
      ${$this.i18n?.tr('discovery.srStatus', { available: dnaOrbCanvas?.bubbleCount ?? 0, followed: followedCount }) ?? ''}
    </div>
  </div>
</template>
