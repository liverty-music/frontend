<main class="[ callback-layout ]">
  <output if.bind="!error" class="callback-loading" role="status" aria-busy="true">
    <div class="callback-spinner"></div>
    <p class="callback-status">Verifying authentication...</p>
  </output>
  <section if.bind="error" class="callback-error">${error}</section>
  <a if.bind="error" href="/" class="callback-home-link"
    >Return Home</a
  >
</main>
