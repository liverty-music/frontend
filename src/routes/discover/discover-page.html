<template>
  <import from="./discover-page.css"></import>
  <import from="../../components/dna-orb/dna-orb-canvas"></import>


  <div class="discover-layout" data-search-mode.bind="isSearchMode">

    <!-- Search bar -->
    <div class="search-bar">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.35-4.35"></path>
      </svg>
      <input
        type="text"
        class="search-input"
        placeholder.bind="$this.i18n?.tr('discover.searchPlaceholder') ?? ''"
        value.bind="searchQuery"
        aria-label.bind="$this.i18n?.tr('discover.searchPlaceholder') ?? ''"
      >
      <button
        if.bind="searchQuery"
        class="clear-button"
        click.trigger="clearSearch()"
        aria-label.bind="$this.i18n?.tr('discover.clearSearch') ?? ''"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6 6 18"></path>
          <path d="m6 6 12 12"></path>
        </svg>
      </button>
    </div>

    <!-- Genre chips (hidden during search) -->
    <div class="genre-chips">
      <button
        repeat.for="tag of genreTags; key.bind: tag"
        class="genre-chip" data-active.bind="activeTag === tag"
        click.trigger="onGenreSelected(tag)"
        disabled.bind="isLoadingTag"
        aria-pressed.bind="activeTag === tag"
      >
        ${tag}
      </button>
    </div>

    <!-- Onboarding popover guide (shown once on entry) -->
    <div
      if.bind="isOnboarding"
      class="onboarding-guide"
      popover="auto"
      ref="onboardingGuide"
    >
      ${i18n.tr('discovery.popoverGuide')}
    </div>

    <!-- Bubble UI (hidden during search) -->
    <div class="bubble-area">
      <dna-orb-canvas
        component.ref="dnaOrbCanvas"
        artists.bind="poolBubbles"
        orb-intensity.bind="orbIntensity"
        followed-ids.bind="poolFollowedIds"
        followed-count.bind="followedCount"
        show-followed-indicator.one-time="true"
        artist-selected.trigger="onArtistSelected($event)"
        need-more-bubbles.trigger="onNeedMoreBubbles($event)"
      ></dna-orb-canvas>

      <!-- Orb label -->
      <div class="orb-label">
        Music DNA ${followedCount > 0 ? '· ' + followedCount : ''}
      </div>
    </div>

    <!-- Search results (shown during search) -->
    <div class="search-results">
      <div if.bind="isSearching" class="search-status" t="discover.searching">
      </div>

      <div if.bind="!isSearching && isSearchMode && searchResults.length === 0 && searchQuery.trim().length > 0" class="search-status" t="discover.noResults">
      </div>

      <div class="results-list">
        <div
          repeat.for="artist of searchResults; key.bind: artist.id"
          class="result-item"
        >
          <div class="result-info">
            <div class="result-avatar">
              ${artist.name.charAt(0)}
            </div>
            <span class="result-name">${artist.name}</span>
          </div>
          <button
            class="follow-button" data-followed.bind="isArtistFollowed(artist.id)"
            click.trigger="onFollowFromSearch(artist)"
            disabled.bind="isArtistFollowed(artist.id)"
            aria-label.bind="isArtistFollowed(artist.id) ? ($this.i18n?.tr('discover.alreadyFollowing', { name: artist.name }) ?? '') : ($this.i18n?.tr('discover.followArtist', { name: artist.name }) ?? '')"
          >
            <svg if.bind="!isArtistFollowed(artist.id)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M12 5v14"></path>
              <path d="M5 12h14"></path>
            </svg>
            <svg if.bind="isArtistFollowed(artist.id)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M20 6 9 17l-5-5"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Screen reader status -->
    <div
      role="status"
      aria-live="polite"
      class="sr-only"
      textcontent.bind="srStatusText"
    ></div>
  </div>
</template>
