<import from="./consent-route.css"></import>

<main class="[ consent-route ] [ flow ]">
  <header class="consent-header">
    <h1 t="onboarding.consent.title" class="consent-title"></h1>
    <p t="onboarding.consent.intro" class="consent-paragraph"></p>
  </header>

  <section class="[ consent-card ] [ flow ]">
    <div class="consent-row">
      <div class="consent-row-text">
        <div class="consent-row-label-line">
          <svg-icon name="globe" class="consent-row-icon"></svg-icon>
          <span t="onboarding.consent.processor.label" class="consent-row-label"></span>
        </div>
        <span t="onboarding.consent.processor.description" class="consent-row-description"></span>
      </div>
    </div>

    <hr class="[ consent-divider ]">

    <div class="consent-row">
      <div class="consent-row-text">
        <div class="consent-row-label-line">
          <svg-icon name="info" class="consent-row-icon"></svg-icon>
          <span t="onboarding.consent.optOut.label" class="consent-row-label"></span>
        </div>
        <span t="onboarding.consent.optOut.description" class="consent-row-description"></span>
      </div>
    </div>
  </section>

  <p class="consent-policy-line">
    <a
      href="https://liverty.me/privacy"
      target="_blank"
      rel="noopener noreferrer"
      t="settings.privacyPolicy"
      class="consent-policy-link"
    ></a>
  </p>

  <footer class="[ consent-actions ]">
    <button
      busy-on-click.bind="() => acknowledge()"
      class="consent-btn-primary"
      t="onboarding.consent.actions.acknowledge"
    ></button>
    <button
      busy-on-click.bind="() => openSettings()"
      class="consent-btn-text"
      t="onboarding.consent.actions.manage"
    ></button>
  </footer>
</main>
