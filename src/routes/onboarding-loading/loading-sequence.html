<import from="./loading-sequence.css"></import>

<main class="[ loading-layout ]">
	<!-- Pulsing orb visual -->
	<div class="pulsing-orb"></div>

	<!-- Phase message -->
	<div class="message-container">
		<p class="loading-message" data-visible.bind="isPhaseVisible">${currentPhaseMessage}</p>
	</div>

	<!-- Step dots progress indicator -->
	<div class="step-dots" aria-label="Progress steps">
		<div repeat.for="i of totalPhases; key.bind: i" class="step-dot" data-step-state.bind="getStepState(i)"></div>
	</div>

	<!-- Step label -->
	<p class="step-label">${currentPhase} / ${totalPhases}</p>

	<!-- Artist search progress counter -->
	<p if.bind="searchTotalCount > 0" class="progress-label">${searchCompletedCount}/${searchTotalCount} アーティスト完了</p>
</main>
