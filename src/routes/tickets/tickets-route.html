<import from="./tickets-route.css"></import>

<page-header title-key="nav.tickets"></page-header>

<main>
  <!-- Loading state -->
  <div if.bind="isLoading" class="state-center" role="status" aria-busy="true">
    <div class="spinner"></div>
    <p class="state-text">Loading tickets...</p>
  </div>

  <!-- Error state -->
  <state-placeholder
    if.bind="!isLoading && error"
    icon="info"
    description.bind="error"
  ></state-placeholder>

  <!-- Empty state -->
  <state-placeholder
    if.bind="!isLoading && !error && tickets.length === 0"
    icon="ticket"
    title="No tickets yet"
    description="Your soulbound tickets will appear here once minted for an event."
  ></state-placeholder>

  <!-- Ticket list -->
  <ul if.bind="!isLoading && !error && tickets.length > 0" class="ticket-list" role="list">
    <li
      repeat.for="ticket of tickets; key.bind: ticket.id?.value"
      class="ticket-card"
    >
      <div class="ticket-row">
        <div class="ticket-info">
          <p class="ticket-name">
            Event ${ticket.eventId?.value ?? ''}
          </p>
          <div class="ticket-meta">
            <span class="ticket-date">${mintDate(ticket) | date:'short'}</span>
            <span if.bind="ticket.tokenId" class="ticket-token">${formatTokenId(ticket)}</span>
          </div>
          <span class="soulbound-badge">
            <svg-icon name="lock" size="xs"></svg-icon>
            Soulbound
          </span>
        </div>

        <button
          click.trigger="generateEntryCode(ticket)"
          disabled.bind="isGenerating"
          class="entry-btn"
        >
          <svg-icon if.bind="!isGenerating || generatingTicketId !== ticket.id?.value" name="qr-code"></svg-icon>
          <div if.bind="isGenerating && generatingTicketId === ticket.id?.value" class="spinner spinner-sm"></div>
          Entry
        </button>
      </div>
    </li>
  </ul>
</main>

<!-- Proof generation progress dialog -->
<dialog
  ref="generatingDialog"
  cancel.trigger="$event.preventDefault()"
  aria-labelledby="generating-dialog-title"
  class="center-dialog"
>
  <div role="alert" aria-live="polite" class="dialog-card">
    <div class="spinner spinner-lg"></div>
    <p id="generating-dialog-title" class="dialog-title">Generating Entry Code</p>
    <p class="dialog-desc">${proofProgress}</p>
    <p class="dialog-hint">This may take up to 30 seconds on mobile devices.</p>
  </div>
</dialog>

<!-- QR Code dialog -->
<dialog
  ref="qrDialog"
  click.trigger="$event.target === qrDialog && dismissQr()"
  cancel.trigger="dismissQr()"
  aria-labelledby="qr-modal-title"
  class="center-dialog"
>
  <div class="dialog-card">
    <h2 id="qr-modal-title" class="dialog-title">Entry Code</h2>
    <p class="dialog-desc">Present this QR code at the venue entrance.</p>
    <div class="qr-wrapper">
      <img src.bind="qrDataUrl" alt="Entry QR Code" />
    </div>
    <button
      click.trigger="dismissQr()"
      class="dialog-close-btn"
    >
      Close
    </button>
  </div>
</dialog>
