<!-- Screen 1: Hero-only hook screen -->
<header class="[ welcome-hero ]">
  <p class="welcome-brand">
    Liverty Music
  </p>
  <p t="welcome.hero.descriptor" class="welcome-descriptor"></p>
  <h1 t="welcome.hero.title" class="welcome-title"></h1>
  <p t="welcome.hero.subtitle" class="welcome-subtitle"></p>

  <fieldset class="welcome-lang">
    <legend class="[ visually-hidden ]">Language</legend>
    <label repeat.for="lang of supportedLanguages" class="welcome-lang-label">
      <input
        type="radio"
        class="[ visually-hidden ]"
        name="welcome-lang"
        model.bind="lang"
        checked.bind="currentLocale"
      >
      <span class="welcome-lang-text">${lang === 'ja' ? '日本語' : 'EN'}</span>
    </label>
  </fieldset>

  <!-- With preview data: single scroll-affordance that reveals Screen 2 -->
  <button
    if.bind="dateGroups.length > 0"
    click.trigger="scrollToPreview()"
    class="welcome-scroll-cta"
    t="welcome.hero.seePreview"
  ></button>

  <!-- Without preview data: no Screen 2 exists, so fall back to inline CTAs
       so unauthenticated users can still start onboarding or sign in. The
       guest-friendly note rides above the CTA group per the landing-page spec
       so the no-account-required message stays visible without scrolling. -->
  <div else class="[ welcome-hero-fallback ]">
    <p t="welcome.guestFriendly" class="welcome-guest-friendly"></p>
    <div class="[ welcome-cta-group welcome-hero-fallback-cta-group ]">
      <button
        click.trigger="handleGetStarted()"
        class="welcome-btn-primary"
        t="welcome.cta.getStarted"
      ></button>
      <button
        click.trigger="handleLogin()"
        class="welcome-btn-secondary"
        t="welcome.cta.login"
      ></button>
    </div>
  </div>
</header>

<!-- Screen 2: Live dashboard preview + CTA -->
<section class="[ welcome-screen-2 ]" if.bind="dateGroups.length > 0">
  <p t="welcome.preview.label" class="welcome-preview-label"></p>
  <div class="[ welcome-preview ]" data-testid="welcome-preview" role="presentation">
    <concert-highway
      date-groups.bind="dateGroups"
      is-readonly="true"
      show-beams="true"
    ></concert-highway>
  </div>

  <footer class="[ welcome-actions ]">
    <p t="welcome.guestFriendly" class="welcome-guest-friendly"></p>

    <div class="welcome-cta-group">
      <button
        click.trigger="handleGetStarted()"
        class="welcome-btn-primary"
        t="welcome.cta.getStarted"
      ></button>

      <button
        click.trigger="handleLogin()"
        class="welcome-btn-secondary"
        t="welcome.cta.login"
      ></button>
    </div>
  </footer>
</section>
