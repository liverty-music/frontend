<main class="[ welcome-layout ]">
  <!-- Brand wordmark -->
  <p class="welcome-brand">
    Liverty Music
  </p>

  <!-- Hero copy -->
  <h1 t="welcome.hero.title" class="welcome-title"></h1>
  <p t="welcome.hero.subtitle" class="welcome-subtitle"></p>

  <!-- CTA buttons -->
  <footer class="welcome-actions">
    <button
      click.trigger="handleGetStarted()"
      class="welcome-btn-primary"
      t="welcome.cta.getStarted"
    ></button>

    <button
      click.trigger="handleLogin()"
      class="welcome-btn-secondary"
      t="welcome.cta.login"
    ></button>
  </footer>

  <!-- Language toggle -->
  <nav class="welcome-lang" aria-label="Language">
    <button
      repeat.for="lang of supportedLanguages"
      click.trigger="selectLanguage(lang)"
      class="welcome-lang-btn"
      data-active.bind="isCurrentLanguage(lang)"
      aria-current.attr="isCurrentLanguage(lang) ? 'true' : null"
    >${lang === 'ja' ? '日本語' : 'EN'}</button>
  </nav>
</main>
