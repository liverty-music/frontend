<!-- Screen 1: Hero with CTA (full viewport, actionable first view) -->
<header class="[ welcome-hero ]">
  <p class="welcome-brand">
    Liverty Music
  </p>
  <h1 t="welcome.hero.title" class="welcome-title"></h1>
  <p t="welcome.hero.subtitle" class="welcome-subtitle"></p>

  <div class="welcome-cta-group">
    <button
      click.trigger="handleGetStarted()"
      class="welcome-btn-primary"
      t="welcome.cta.getStarted"
    ></button>

    <button
      click.trigger="handleLogin()"
      class="welcome-btn-secondary"
      t="welcome.cta.login"
    ></button>
  </div>

  <fieldset class="welcome-lang">
    <legend class="[ visually-hidden ]">Language</legend>
    <label repeat.for="lang of supportedLanguages" class="welcome-lang-label">
      <input
        type="radio"
        class="[ visually-hidden ]"
        name="welcome-lang"
        model.bind="lang"
        checked.bind="currentLocale"
      >
      <span class="welcome-lang-text">${lang === 'ja' ? '日本語' : 'EN'}</span>
    </label>
  </fieldset>

  <div class="welcome-scroll-hint" if.bind="dateGroups.length > 0" aria-hidden="true"></div>
</header>

<!-- Screen 2: Live dashboard preview (bonus scroll destination) -->
<section class="[ welcome-screen-2 ]" if.bind="dateGroups.length > 0">
  <p t="welcome.preview.label" class="welcome-preview-label"></p>
  <div class="[ welcome-preview ]" role="presentation">
    <concert-highway
      date-groups.bind="dateGroups"
      is-readonly="true"
      show-beams="true"
    ></concert-highway>
  </div>

  <footer class="[ welcome-actions ]">
    <p t="welcome.guestFriendly" class="welcome-guest-friendly"></p>

    <div class="welcome-cta-group">
      <button
        click.trigger="handleGetStarted()"
        class="welcome-btn-primary"
        t="welcome.cta.getStarted"
      ></button>

      <button
        click.trigger="handleLogin()"
        class="welcome-btn-secondary"
        t="welcome.cta.login"
      ></button>
    </div>
  </footer>
</section>
