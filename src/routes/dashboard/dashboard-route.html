<page-header title-key="nav.home">
  <artist-filter-bar
    if.bind="!isOnboarding"
    counted-artists.bind="countedArtists"
    selected-ids.two-way="filteredArtistIds"
    selected-statuses.two-way="filteredStatuses"
    is-authenticated.bind="isAuthenticated"
  ></artist-filter-bar>
  <page-help page="dashboard"></page-help>
</page-header>

<!-- Loading state -->
<p if.bind="isLoading" class="loading-text" data-testid="dashboard-loading" t="dashboard.loading"></p>

<!-- Error state -->
<inline-error
  if.bind="loadError"
  message.bind="i18n.tr('dashboard.error.load')"
  error.bind="loadError"
  retry-action.bind="() => loadData()"
></inline-error>

<!-- Guest empty-state CTA: unauthenticated visitor with zero follows. Soft gate
     guidance toward discovery instead of a guard redirect. -->
<state-placeholder if.bind="!isLoading && !loadError && showGuestEmptyState && !needsRegion" icon="clock">
  <p t="dashboard.guestEmpty.title" class="dashboard-empty-title"></p>
  <p t="dashboard.guestEmpty.subtitle" class="dashboard-empty-subtitle"></p>
  <a href.bind="'discovery'" t="dashboard.guestEmpty.cta" class="discover-cta"></a>
</state-placeholder>

<!-- Empty state -->
<state-placeholder if.bind="!isLoading && !loadError && !showGuestEmptyState && filteredDateGroups.length === 0" icon="clock">
  <p t="dashboard.empty.title" class="dashboard-empty-title"></p>
  <p t="dashboard.empty.subtitle" class="dashboard-empty-subtitle"></p>
  <a href.bind="'discovery'" t="dashboard.empty.discoverLink" class="discover-cta"></a>
</state-placeholder>

<!-- Concert highway — always in DOM for E2E compatibility -->
<concert-highway
  date-groups.bind="filteredDateGroups"
  show-beams="true"
  data-blurred.bind="needsRegion"
  event-selected.trigger="onEventSelected($event)"
></concert-highway>

<!-- Bottom sheet for event details (top-layer dialog) -->
<event-detail-sheet component.ref="detailSheet"></event-detail-sheet>

<!-- Signup prompt banner for unauthenticated users (non-dismissable) -->
<signup-prompt-banner
  visible.bind="showSignupBanner && !isAuthenticated"
  message.bind="i18n.tr('myArtists.signupBanner.message')"
  signup-requested.trigger="onSignupRequested()">
</signup-prompt-banner>

<!-- Home area selector bottom sheet -->
<user-home-selector
  component.ref="homeSelector"
  on-home-selected.bind="(code) => onHomeSelected(code)"
  required.bind="isOnboarding"
></user-home-selector>

<!-- Celebration overlay — two tiers (guest light / post-signup confetti),
     gated on timetable readiness via maybeCelebrate() -->
<celebration-overlay
  active.bind="showCelebration"
  confetti.bind="celebrationConfetti"
  message.bind="celebrationMessage"
  sub-message.bind="celebrationSubMessage"
  on-open.bind="() => onCelebrationOpened()"
  on-dismissed.bind="() => onCelebrationDismissed()"
></celebration-overlay>

<!-- PostSignupDialog — shown once after first-time signup -->
<post-signup-dialog active.bind="showPostSignupDialog"></post-signup-dialog>
