<import from="../../components/live-highway/event-card"></import>
<import from="../../components/live-highway/event-detail-sheet"></import>
<import from="../../components/user-home-selector/user-home-selector"></import>
<import from="../../components/inline-error/inline-error"></import>
<import from="../../components/celebration-overlay/celebration-overlay"></import>
<import from="../../components/signup-prompt-banner/signup-prompt-banner"></import>
<import from="../../components/page-help/page-help"></import>
<import from="../../components/post-signup-dialog/post-signup-dialog"></import>

<!-- Laser beams — before header so header paints on top -->
<div class="[ beam-overlay ]" if.bind="laserBeams.length > 0">
  <div
    repeat.for="b of laserBeams"
    class="[ laser-beam ]"
    data-beam-anchor.bind="b.anchorIndex"
    beam-vars="hue.bind: b.hue; left.bind: b.left; right.bind: b.right"
  ></div>
</div>

<!-- Stage header (fixed above scroll container via grid row) -->
<header if.bind="dateGroups.length > 0" class="[ stage-header ]">
  <span data-stage="home">HOME STAGE</span>
  <span data-stage="near">NEAR STAGE</span>
  <span data-stage="away">AWAY STAGE</span>
</header>

<!-- Concert list with promise.bind -->
<main
  class="[ concert-scroll ]"
  data-blurred.bind="needsRegion"
  promise.bind="dataPromise"
  event-selected.trigger="onEventSelected($event)"
>
  <!-- Loading state -->
  <p pending class="loading-text">Loading events...</p>

  <!-- Success state -->
  <template then.from-view="data">
    <!-- Empty state -->
    <state-placeholder if.bind="dateGroups.length === 0" icon="clock">
      <p t="dashboard.empty.title" class="dashboard-empty-title"></p>
      <p t="dashboard.empty.subtitle" class="dashboard-empty-subtitle"></p>
      <a href="/discovery" t="dashboard.empty.discoverLink" class="dashboard-empty-link"></a>
    </state-placeholder>

    <!-- Data loaded -->
    <ol if.bind="dateGroups.length > 0" class="[ date-group-list ]">
      <li repeat.for="group of dateGroups; key.bind: group.dateKey">
        <header class="[ date-separator ]">
          <time>${group.label}</time>
        </header>

        <ol class="[ lane-grid ]" aria-label="Concerts">
          <li class="[ lane ]" data-empty.bind="group.home.length === 0">
            <event-card
              repeat.for="ev of group.home; key.bind: ev.id"
              event.bind="ev"
              lane="home"
              beam-index.bind="getBeamIndex(ev.id)"
            ></event-card>
          </li>
          <li class="[ lane ]" data-empty.bind="group.nearby.length === 0">
            <event-card
              repeat.for="ev of group.nearby; key.bind: ev.id"
              event.bind="ev"
              lane="nearby"
              beam-index.bind="getBeamIndex(ev.id)"
            ></event-card>
          </li>
          <li class="[ lane ]" data-empty.bind="group.away.length === 0">
            <event-card
              repeat.for="ev of group.away; key.bind: ev.id"
              event.bind="ev"
              lane="away"
              beam-index.bind="getBeamIndex(ev.id)"
            ></event-card>
          </li>
        </ol>
      </li>
    </ol>

  </template>

  <!-- Error state -->
  <template catch.from-view="err">
    <inline-error
      message.bind="i18n.tr('dashboard.error.load')"
      error.bind="err"
      retry-action.bind="() => loadData()"
    ></inline-error>
  </template>
</main>

<!-- Bottom sheet for event details (top-layer dialog) -->
<event-detail-sheet component.ref="detailSheet"></event-detail-sheet>

<!-- Signup prompt banner for unauthenticated users -->
<signup-prompt-banner
  visible.bind="showSignupBanner && !isAuthenticated"
  message.bind="i18n.tr('myArtists.signupBanner.message')"
  signup-requested.trigger="onSignupRequested()"
  banner-dismissed.trigger="onBannerDismissed()">
</signup-prompt-banner>

<!-- Home area selector bottom sheet -->
<user-home-selector
  component.ref="homeSelector"
  on-home-selected.bind="(code) => onHomeSelected(code)"
  required.bind="isOnboarding"
></user-home-selector>

<!-- Celebration overlay — shown after Lane Intro; tap-to-dismiss -->
<celebration-overlay
  active.bind="showCelebration"
  message.bind="i18n.tr('dashboard.celebration.complete')"
  sub-message.bind="i18n.tr('dashboard.celebration.explore')"
  on-open.bind="() => onCelebrationOpen()"
  on-dismissed.bind="() => onCelebrationDismissed()"
></celebration-overlay>

<!-- PageHelp — persistent ? icon, auto-opens once per onboarding session -->
<page-help if.bind="isOnboarding" page="dashboard"></page-help>

<!-- PostSignupDialog — shown once after first-time signup -->
<post-signup-dialog active.bind="showPostSignupDialog"></post-signup-dialog>
