<import from="../../components/user-home-selector/user-home-selector"></import>

<div class="settings-layout">
  <!-- Header -->
  <div class="settings-header">
    <h1 t="settings.title" class="settings-header-title"></h1>
  </div>

  <div class="settings-body">
    <!-- PREFERENCES Section -->
    <section>
      <h2 t="settings.preferences" class="settings-section-title"></h2>
      <div class="settings-card">
        <!-- My Home Area -->
        <button
          click.trigger="openHomeSelector()"
          class="settings-row"
        >
          <div class="settings-row-start">
            <svg class="settings-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"></path>
              <circle cx="12" cy="10" r="3"></circle>
            </svg>
            <span t="settings.myHomeArea" class="settings-row-label"></span>
          </div>
          <div class="settings-row-end">
            <span class="settings-row-value">${currentHomeDisplay}</span>
            <svg class="settings-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 18l6-6-6-6"></path>
            </svg>
          </div>
        </button>

        <!-- Divider -->
        <div class="settings-divider"></div>

        <!-- Language -->
        <button
          click.trigger="cycleLanguage()"
          class="settings-row"
        >
          <div class="settings-row-start">
            <svg class="settings-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="2" y1="12" x2="22" y2="12"></line>
              <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"></path>
            </svg>
            <span t="settings.language" class="settings-row-label"></span>
          </div>
          <div class="settings-row-end">
            <span class="settings-row-value">${currentLanguageLabel}</span>
            <svg class="settings-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 18l6-6-6-6"></path>
            </svg>
          </div>
        </button>

        <!-- Divider -->
        <div class="settings-divider"></div>

        <!-- Push Notifications -->
        <button
          click.trigger="toggleNotifications()"
          role="switch"
          aria-checked.bind="notificationsEnabled"
          disabled.bind="!vapidAvailable"
          class="settings-row"
          data-disabled.bind="!vapidAvailable"
        >
          <div class="settings-toggle-col">
            <div class="settings-row-start">
              <svg class="settings-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 01-3.46 0"></path>
              </svg>
              <span t="settings.pushNotifications" class="settings-row-label"></span>
            </div>
            <span if.bind="!vapidAvailable" t="settings.notAvailable" class="settings-row-hint"></span>
          </div>
          <!-- Toggle switch -->
          <div class="settings-toggle-track" data-on.bind="notificationsEnabled">
            <div class="settings-toggle-thumb" data-on.bind="notificationsEnabled"></div>
          </div>
        </button>
      </div>
    </section>

    <!-- ABOUT Section -->
    <section>
      <h2 t="settings.about" class="settings-section-title"></h2>
      <div class="settings-card">
        <!-- Terms of Service -->
        <a
          href="https://liverty.me/terms"
          target="_blank"
          rel="noopener noreferrer"
          class="settings-row"
        >
          <span t="settings.termsOfService" class="settings-row-label"></span>
          <svg class="settings-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18l6-6-6-6"></path>
          </svg>
        </a>

        <div class="settings-divider"></div>

        <!-- Privacy Policy -->
        <a
          href="https://liverty.me/privacy"
          target="_blank"
          rel="noopener noreferrer"
          class="settings-row"
        >
          <span t="settings.privacyPolicy" class="settings-row-label"></span>
          <svg class="settings-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18l6-6-6-6"></path>
          </svg>
        </a>

        <div class="settings-divider"></div>

        <!-- OSS Licenses -->
        <a
          href="https://liverty.me/licenses"
          target="_blank"
          rel="noopener noreferrer"
          class="settings-row"
        >
          <span t="settings.ossLicenses" class="settings-row-label"></span>
          <svg class="settings-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18l6-6-6-6"></path>
          </svg>
        </a>
      </div>
    </section>

    <!-- ACCOUNT Section -->
    <section>
      <h2 t="settings.account" class="settings-section-title"></h2>
      <div class="settings-card">
        <button
          click.trigger="signOut()"
          class="settings-row settings-sign-out"
        >
          <span t="settings.signOut" class="settings-sign-out-text"></span>
        </button>
      </div>
    </section>
  </div>
</div>

<!-- Home Area Selector Bottom Sheet -->
<user-home-selector
  component.ref="homeSelector"
  on-home-selected.bind="(code) => onHomeSelected(code)"
></user-home-selector>
