    <circle cx="12" cy="12" r="3"></circle>

  <h1 class="font-display text-xl font-bold tracking-tight mb-4">Settings</h1>

  <div if.bind="auth.isAuthenticated" class="flex flex-col items-center gap-3">
    <p class="text-sm text-text-secondary">${auth.user.profile.name || auth.user.profile.preferred_username || 'User'}</p>
    <button
      click.trigger="signOut()"
      class="text-sm text-text-muted hover:text-text-secondary px-4 py-2 rounded-[var(--radius-button)] border border-white/10 hover:border-white/20 transition-colors"
    >
      Sign Out

  <p if.bind="!auth.isAuthenticated" class="text-sm text-text-muted">Not signed in</p>
