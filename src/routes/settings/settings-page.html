<import from="../../components/area-selector-sheet/area-selector-sheet"></import>

<div class="min-h-screen bg-surface-base text-text-primary pb-20">
  <div class="px-4 pt-6 pb-4">
    <h1 class="font-display text-2xl font-bold tracking-tight">Settings</h1>
  </div>

  <!-- PREFERENCES Section -->
  <div class="px-4 mb-6">
    <p class="text-text-muted text-xs font-semibold uppercase tracking-wider mb-2 px-1">Preferences</p>
    <div class="bg-surface-raised rounded-[var(--radius-card)] border border-white/10 overflow-hidden">
      <!-- My Area -->
      <button
        click.trigger="openAreaSelector()"
        class="w-full flex items-center justify-between px-4 py-3.5 hover:bg-white/5 transition-colors"
      >
        <div class="flex items-center gap-3">
          <svg class="w-5 h-5 text-text-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"></path>
            <circle cx="12" cy="10" r="3"></circle>
          </svg>
          <span class="text-text-primary text-sm font-medium">My Area</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-text-secondary text-sm">${currentArea || 'Not set'}</span>
          <svg class="w-4 h-4 text-text-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </div>
      </button>

      <!-- Divider -->
      <div class="mx-4 border-t border-white/10"></div>

      <!-- Push Notifications -->
      <button
        click.trigger="toggleNotifications()"
        disabled.bind="isTogglingNotifications"
        class="w-full flex items-center justify-between px-4 py-3.5 hover:bg-white/5 transition-colors disabled:opacity-60"
      >
        <div class="flex items-center gap-3">
          <svg class="w-5 h-5 text-text-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 01-3.46 0"></path>
          </svg>
          <span class="text-text-primary text-sm font-medium">Push Notifications</span>
        </div>
        <!-- Toggle switch -->
        <div class="relative w-11 h-6 rounded-full transition-colors duration-200 ${notificationsEnabled ? 'bg-brand-primary' : 'bg-white/20'}">
          <div class="absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform duration-200 ${notificationsEnabled ? 'translate-x-5' : 'translate-x-0'}"></div>
        </div>
      </button>
    </div>
  </div>

  <!-- ABOUT Section -->
  <div class="px-4 mb-6">
    <p class="text-text-muted text-xs font-semibold uppercase tracking-wider mb-2 px-1">About</p>
    <div class="bg-surface-raised rounded-[var(--radius-card)] border border-white/10 overflow-hidden">
      <!-- Terms of Service -->
      <a
        href="https://liverty.me/terms"
        target="_blank"
        rel="noopener noreferrer"
        class="flex items-center justify-between px-4 py-3.5 hover:bg-white/5 transition-colors"
      >
        <span class="text-text-primary text-sm font-medium">Terms of Service</span>
        <svg class="w-4 h-4 text-text-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </a>

      <div class="mx-4 border-t border-white/10"></div>

      <!-- Privacy Policy -->
      <a
        href="https://liverty.me/privacy"
        target="_blank"
        rel="noopener noreferrer"
        class="flex items-center justify-between px-4 py-3.5 hover:bg-white/5 transition-colors"
      >
        <span class="text-text-primary text-sm font-medium">Privacy Policy</span>
        <svg class="w-4 h-4 text-text-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </a>

      <div class="mx-4 border-t border-white/10"></div>

      <!-- OSS Licenses -->
      <a
        href="https://liverty.me/licenses"
        target="_blank"
        rel="noopener noreferrer"
        class="flex items-center justify-between px-4 py-3.5 hover:bg-white/5 transition-colors"
      >
        <span class="text-text-primary text-sm font-medium">OSS Licenses</span>
        <svg class="w-4 h-4 text-text-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </a>
    </div>
  </div>

  <!-- ACCOUNT Section -->
  <div class="px-4 mb-6">
    <p class="text-text-muted text-xs font-semibold uppercase tracking-wider mb-2 px-1">Account</p>
    <div class="bg-surface-raised rounded-[var(--radius-card)] border border-white/10 overflow-hidden">
      <button
        click.trigger="signOut()"
        class="w-full px-4 py-3.5 text-left text-sm font-medium text-red-400 hover:bg-white/5 transition-colors"
      >
        Sign Out
      </button>
    </div>
  </div>

  <!-- Area Selector Bottom Sheet -->
  <area-selector-sheet
    view-model.ref="areaSheet"
    on-area-selected.call="onAreaSelected($event)"
  ></area-selector-sheet>
</div>
