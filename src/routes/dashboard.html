<import from="../components/notification-prompt/notification-prompt"></import>
<import from="../components/region-setup-sheet/region-setup-sheet"></import>

<div class="h-screen flex flex-col bg-surface-base">
  <!-- Header -->
  <div class="shrink-0 px-4 py-4 border-b border-white/10 bg-surface-raised">
    <div class="flex items-center justify-between">
      <h1 class="font-display text-xl font-bold text-text-primary tracking-tight">Live Highway</h1>
      <div class="grid grid-cols-3 text-[10px] text-text-muted gap-x-3 font-medium">
        <span>My City</span>
        <span>Region</span>
        <span>Others</span>
      </div>
    </div>
  </div>

  <!-- Notification opt-in prompt (soft ask) -->
  <notification-prompt></notification-prompt>

  <!-- Highway (blur when region not set) -->
  <div class="flex-1 min-h-0 transition-[filter] duration-500 ${needsRegion ? 'blur-sm pointer-events-none' : ''}">
    <live-highway
      date-groups.bind="dateGroups"
      loading.bind="isLoading"
    ></live-highway>
  </div>
</div>

<!-- Region setup bottom sheet -->
<region-setup-sheet
  view-model.ref="regionSheet"
  on-region-selected.call="onRegionSelected($event)"
></region-setup-sheet>
