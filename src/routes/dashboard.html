<import from="../components/live-highway/live-highway"></import>
<import from="../components/user-home-selector/user-home-selector"></import>
<import from="../components/inline-error/inline-error"></import>

<import from="../components/celebration-overlay/celebration-overlay"></import>
<import from="../components/signup-prompt-banner/signup-prompt-banner"></import>

<!-- Stale data warning -->
<aside if.bind="isStale" class="[ dashboard-stale-banner ]">
  <svg-icon name="warning" class="dashboard-stale-icon"></svg-icon>
  <span t="dashboard.stale.message"></span>
  <button click.trigger="retry()" t="dashboard.stale.retry" class="dashboard-stale-retry"></button>
</aside>

<!-- Highway content with promise.bind -->
<main class="[ dashboard-main ]" data-blurred.bind="needsRegion" promise.bind="dataPromise">
  <!-- Loading skeleton -->
  <live-highway
    pending
    date-groups.bind="dateGroups"
    loading.one-time="true"
  ></live-highway>

  <!-- Success state -->
  <template then.from-view="data">
    <!-- Empty state -->
    <state-placeholder if.bind="dateGroups.length === 0" icon="clock">
      <p t="dashboard.empty.title" class="dashboard-empty-title"></p>
      <p t="dashboard.empty.subtitle" class="dashboard-empty-subtitle"></p>
      <a href="/discover" t="dashboard.empty.discoverLink" class="dashboard-empty-link"></a>
    </state-placeholder>

    <!-- Data loaded -->
    <live-highway
      if.bind="dateGroups.length > 0"
      date-groups.bind="dateGroups"
      loading.one-time="false"
    ></live-highway>
  </template>

  <!-- Error state -->
  <template catch.from-view="err">
    <inline-error
      if.bind="!isStale"
      message.bind="i18n.tr('dashboard.error.load')"
      error.bind="err"
      retry-action.bind="() => retry()"
    ></inline-error>

    <!-- Stale data: show previous results despite error -->
    <live-highway
      if.bind="isStale"
      date-groups.bind="dateGroups"
      loading.one-time="false"
    ></live-highway>
  </template>
</main>

<!-- Signup prompt banner for unauthenticated users -->
<signup-prompt-banner
  visible.bind="showSignupBanner && !isAuthenticated"
  message="&#x1F514; 通知を有効にするには"
  signup-requested.trigger="onSignupRequested()">
</signup-prompt-banner>

<!-- Home area selector bottom sheet -->
<user-home-selector
  component.ref="homeSelector"
  on-home-selected.bind="(code) => onHomeSelected(code)"
  required.bind="isOnboarding"
></user-home-selector>

<!-- Celebration overlay (onboarding first dashboard load) -->
<celebration-overlay
  active.bind="showCelebration"
  message.bind="$this.i18n?.tr('dashboard.celebration.complete') ?? 'あなただけのタイムテーブルが完成しました！'"
  on-complete.bind="() => onCelebrationComplete()"
></celebration-overlay>
