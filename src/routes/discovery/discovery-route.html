<template>
  <import from="./discovery-route.css"></import>
  <import from="../../components/dna-orb/dna-orb-canvas"></import>


  <main class="[ discovery-layout ]" data-search-mode.bind="search.isSearchMode">

    <!-- Search bar -->
    <search class="search-bar">
      <svg-icon name="search" class="search-icon"></svg-icon>
      <input
        type="text"
        class="search-input"
        placeholder.bind="$this.i18n?.tr('discovery.searchPlaceholder') ?? ''"
        value.bind="search.searchQuery"
        aria-label.bind="$this.i18n?.tr('discovery.searchPlaceholder') ?? ''"
      >
      <button
        if.bind="search.searchQuery"
        class="clear-button"
        click.trigger="clearSearch()"
        aria-label.bind="$this.i18n?.tr('discovery.clearSearch') ?? ''"
      >
        <svg-icon name="x"></svg-icon>
      </button>
    </search>

    <!-- Genre chips (hidden during search) -->
    <fieldset class="genre-chips">
      <button
        repeat.for="tag of genre.genreTags; key.bind: tag"
        class="genre-chip" data-active.bind="genre.activeTag === tag"
        click.trigger="onGenreSelected(tag)"
        disabled.bind="genre.isLoadingTag"
        aria-pressed.bind="genre.activeTag === tag"
      >
        ${tag}
      </button>
    </fieldset>

    <!-- Bubble UI (hidden during search) -->
    <div class="bubble-area">
      <dna-orb-canvas
        component.ref="dnaOrbCanvas"
        artists.bind="poolBubbles"
        followed-ids.bind="followedIds"
        followed-count.bind="followedCount"
        show-followed-indicator.one-time="true"
        artist-selected.trigger="onArtistSelected($event)"
        need-more-bubbles.trigger="onNeedMoreBubbles($event)"
      ></dna-orb-canvas>

    </div>

    <!-- Search results (shown during search) -->
    <section class="search-results">
      <p if.bind="search.isSearching" class="search-status" t="discovery.searching">
      </p>

      <p if.bind="!search.isSearching && search.isSearchMode && search.searchResults.length === 0 && search.searchQuery.trim().length > 0" class="search-status" t="discovery.noResults">
      </p>

      <ul class="results-list" role="list">
        <li
          repeat.for="artist of search.searchResults; key.bind: artist.id"
          class="result-item"
          data-followed.bind="followedIds.has(artist.id)"
          click.trigger="followedIds.has(artist.id) ? undefined : onFollowFromSearch(artist)"
          role="button"
          aria-disabled.bind="followedIds.has(artist.id)"
          aria-label.bind="followedIds.has(artist.id) ? ($this.i18n?.tr('discovery.alreadyFollowing', { name: artist.name }) ?? '') : ($this.i18n?.tr('discovery.followArtist', { name: artist.name }) ?? '')"
        >
          <div class="result-avatar">
            ${artist.name.charAt(0)}
          </div>
          <span class="result-name">${artist.name}</span>
          <svg-icon if.bind="followedIds.has(artist.id)" name="check" class="followed-check"></svg-icon>
        </li>
      </ul>
    </section>

    <!-- Screen reader status -->
    <output
      role="status"
      aria-live="polite"
      class="sr-only"
      textcontent.bind="srStatusText"
    ></output>
  </main>
</template>
