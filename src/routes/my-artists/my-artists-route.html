<import from="./my-artists-route.css"></import>
<import from="../../components/hype-notification-dialog/hype-notification-dialog"></import>
<import from="../../components/signup-prompt-banner/signup-prompt-banner"></import>

<page-header if.bind="!isLoading && artists.length > 0" title-key="nav.myArtists">
  <span class="artist-count">(${artists.length})</span>
</page-header>

<main>
  <!-- Loading state -->
  <div if.bind="isLoading" class="state-center">
    <loading-spinner></loading-spinner>
  </div>

  <!-- Empty state -->
  <state-placeholder
    if.bind="!isLoading && artists.length === 0"
    icon="music"
  >
    <h2 t="myArtists.empty.title" class="empty-title"></h2>
    <p t="myArtists.empty.subtitle" class="empty-subtitle"></p>
    <button
      click.trigger="goToDiscovery()"
      t="myArtists.empty.discoverButton"
      class="discover-btn"
    ></button>
  </state-placeholder>

  <!-- Artist hype table -->
  <fieldset if.bind="!isLoading && artists.length > 0" class="artists-fieldset">
    <legend class="[ visually-hidden ]" t="nav.myArtists"></legend>
    <table class="artists-table">
      <thead>
        <tr class="artists-thead-row">
          <th scope="col" class="[ visually-hidden ]" t="myArtists.table.artistCol"></th>
          <th scope="col" class="hype-col-header">👀<small>チェック</small></th>
          <th scope="col" class="hype-col-header">🔥<small>地元</small></th>
          <th scope="col" class="hype-col-header">🔥🔥<small>近くも</small></th>
          <th scope="col" class="hype-col-header">🔥🔥🔥<small>どこでも！</small></th>
          <th scope="col" class="[ visually-hidden ]" t="myArtists.table.unfollowCol"></th>
        </tr>
      </thead>
      <tbody data-artist-rows>
        <tr
          repeat.for="artist of artists; key.bind: artist.artist.id"
          class="artist-row"
          css="--_vt-name: artist-${artist.artist.id}; --_dot-color: ${artist.color}"
        >
          <!-- Artist name cell -->
          <th scope="row" class="artist-name-cell">
            <span class="artist-row-indicator" aria-hidden="true"></span>
            <span class="artist-row-name">${artist.artist.name}</span>
          </th>

          <!-- Hype dot cells -->
          <td repeat.for="level of hypeLevels" class="hype-col">
            <label class="hype-label">
              <input
                type="radio"
                class="[ visually-hidden ]"
                name.bind="'hype-' + artist.artist.id"
                model.bind="level"
                checked.bind="artist.hype"
                change.trigger="onHypeInput(artist)"
              >
              <span
                class="hype-dot"
                data-active.bind="level === artist.hype"
                data-level.bind="level"
              ></span>
            </label>
          </td>

          <!-- Unfollow cell -->
          <td class="artist-unfollow-col">
            <button
              type="button"
              class="artist-unfollow-btn"
              aria-label.bind="i18n.tr('myArtists.unfollowArtist', { name: artist.artist.name })"
              click.trigger="unfollowArtist(artist)"
            >
              <svg-icon name="trash" aria-hidden="true"></svg-icon>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </fieldset>
</main>

<!-- Signup prompt banner -->
<signup-prompt-banner
  visible.bind="showSignupBanner && !isAuthenticated"
  message="&#x1F514; 通知を有効にするには"
  signup-requested.trigger="onSignupRequested()"
  banner-dismissed.trigger="onBannerDismissed()">
</signup-prompt-banner>

<!-- Notification dialog (outside main for proper top-layer stacking) -->
<hype-notification-dialog
  active.bind="showNotificationDialog"
  signup-requested.trigger="onSignupRequested()"
  dialog-dismissed.trigger="onDialogDismissed()">
</hype-notification-dialog>
