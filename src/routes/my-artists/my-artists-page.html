<div class="h-screen flex flex-col bg-surface-base text-text-primary pb-14">
  <!-- Header -->
  <div class="shrink-0 px-4 py-4 border-b border-white/10 bg-surface-raised">
    <div class="flex items-center justify-between">
      <h1 class="font-display text-xl font-bold tracking-tight">My Artists</h1>
      <span if.bind="!isLoading && artists.length > 0" class="text-sm text-text-muted">(${artists.length})</span>
    </div>
  </div>

  <!-- Loading state -->
  <div if.bind="isLoading" class="flex-1 flex items-center justify-center">
    <div class="w-6 h-6 border-2 border-brand-primary border-t-transparent rounded-full animate-spin"></div>
  </div>

  <!-- Empty state -->
  <div if.bind="!isLoading && artists.length === 0" class="flex-1 flex flex-col items-center justify-center px-6">
    <svg class="w-16 h-16 text-text-muted mb-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18V5l12-2v13"></path>
      <circle cx="6" cy="18" r="3"></circle>
      <circle cx="18" cy="16" r="3"></circle>
    </svg>
    <h2 class="font-display text-lg font-bold mb-2">No artists followed yet</h2>
    <p class="text-sm text-text-muted text-center mb-6">Discover and follow artists to see them here.</p>
    <button
      click.trigger="goToDiscover()"
      class="px-6 py-2.5 bg-brand-primary text-white font-display font-semibold text-sm rounded-[var(--radius-button)] hover:bg-brand-primary/80 transition-colors"
    >
      Discover Artists
    </button>
  </div>

  <!-- Artist list -->
  <div if.bind="!isLoading && artists.length > 0" class="flex-1 overflow-y-auto">
    <div class="px-4 py-3">
      <div
        repeat.for="artist of artists"
        class="relative overflow-hidden rounded-[var(--radius-card)] mb-2"
      >
        <!-- Delete zone (behind the row) -->
        <div class="absolute inset-y-0 right-0 w-20 bg-red-500 flex items-center justify-center">
          <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path>
          </svg>
        </div>

        <!-- Artist row (swipeable) -->
        <div
          touchstart.trigger="onTouchStart(artist, $event)"
          touchmove.trigger="onTouchMove($event)"
          touchend.trigger="onTouchEnd()"
          touchcancel.trigger="onTouchEnd()"
          class="relative flex items-center gap-3 px-4 py-3.5 bg-surface-raised border border-white/10 touch-pan-y transition-transform ${swipedArtistId === artist.id && swipeOffset < 0 ? '' : 'transition-transform duration-200'}"
          style="transform: translateX(${swipedArtistId === artist.id ? swipeOffset : 0}px)"
        >
          <!-- Color accent dot -->
          <div
            class="w-3 h-3 rounded-full shrink-0"
            style="background-color: ${artist.color}"
          ></div>

          <!-- Artist name -->
          <span class="text-sm text-text-primary font-medium truncate">${artist.name}</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Undo toast -->
  <div
    if.bind="undoVisible"
    role="status"
    class="absolute bottom-16 left-4 right-4 bg-surface-overlay border border-white/10 rounded-[var(--radius-card)] px-4 py-3 flex items-center justify-between shadow-lg"
  >
    <span class="text-sm text-text-primary">${undoArtist?.name} unfollowed</span>
    <button
      click.trigger="undo()"
      class="text-sm font-semibold text-brand-primary hover:text-brand-primary/80 transition-colors ml-4"
    >
      Undo
    </button>
  </div>
</div>
