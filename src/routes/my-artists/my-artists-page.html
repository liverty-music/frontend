<import from="./my-artists-page.css"></import>
<import from="../../components/hype-inline-slider/hype-inline-slider"></import>
<import from="../../components/hype-notification-dialog/hype-notification-dialog"></import>
<import from="../../components/signup-prompt-banner/signup-prompt-banner"></import>

<div class="page-layout">
  <!-- Header -->
  <div class="page-header">
    <div class="header-row">
      <h1 t="nav.myArtists"></h1>
      <div class="header-actions">
        <span if.bind="!isLoading && artists.length > 0" class="artist-count">(${artists.length})</span>
        <button
          if.bind="!isLoading && artists.length > 0"
          click.trigger="toggleView()"
          class="toggle-view-btn"
          aria-label="Toggle view"
        >
          <!-- List icon -->
          <svg if.bind="viewMode === 'grid'" class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line>
            <line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line>
          </svg>
          <!-- Grid icon -->
          <svg if.bind="viewMode === 'list'" class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Hype level legend (sticky) -->
  <header if.bind="!isLoading && artists.length > 0" class="[ hype-legend ]" data-hype-header>
    <span class="hype-legend-item">👀<small>チェック</small></span>
    <span class="hype-legend-item">🔥<small>地元</small></span>
    <span class="hype-legend-item">🔥🔥<small>近くも</small></span>
    <span class="hype-legend-item">🔥🔥🔥<small>どこでも！</small></span>
  </header>

  <!-- Loading state -->
  <div if.bind="isLoading" class="state-center">
    <div class="spinner"></div>
  </div>

  <!-- Empty state -->
  <div if.bind="!isLoading && artists.length === 0" class="state-center">
    <div class="state-content">
      <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"></path>
        <circle cx="6" cy="18" r="3"></circle>
        <circle cx="18" cy="16" r="3"></circle>
      </svg>
      <h2 t="myArtists.empty.title" class="empty-title"></h2>
      <p t="myArtists.empty.subtitle" class="empty-subtitle"></p>
      <button
        click.trigger="goToDiscover()"
        t="myArtists.empty.discoverButton"
        class="discover-btn"
      ></button>
    </div>
  </div>

  <!-- Artist list view -->
  <div if.bind="!isLoading && artists.length > 0 && viewMode === 'list'" class="artist-list">
    <div
      repeat.for="artist of artists; key.bind: artist.id"
      class="artist-row"
      style="--_vt-name: artist-${artist.id}"
      scroll.trigger="checkDismiss($event, artist)"
    >
      <div class="artist-row-content">
        <!-- Artist identity (indicator + name) -->
        <div class="artist-identity">
          <span
            class="[ artist-row-indicator ]"
            style="background: ${artist.color}"
          ></span>
          <span class="[ artist-row-name ]">${artist.name}</span>
        </div>

        <!-- Inline hype slider -->
        <hype-inline-slider
          artist-id.bind="artist.id"
          artist-color.bind="getArtistColor(artist.id)"
          hype-level.bind="hypeStop(artist)"
          is-authenticated.bind="isAuthenticated"
          hype-changed.trigger="onHypeChanged($event)"
          hype-signup-prompt.trigger="onHypeSignupPrompt($event)">
        </hype-inline-slider>
      </div>

      <!-- Dismiss trigger (scroll-snap end target) -->
      <div class="dismiss-end">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path>
        </svg>
      </div>
    </div>
  </div>

  <!-- Artist grid (festival) view -->
  <div if.bind="!isLoading && artists.length > 0 && viewMode === 'grid'" class="artist-grid">
    <div class="artist-grid-inner">
      <div
        repeat.for="artist of artists; key.bind: artist.id"
        touchstart.trigger="onGridTouchStart(artist)"
        touchend.trigger="onGridTouchEnd()"
        touchcancel.trigger="onGridTouchEnd()"
        click.trigger="onGridLongPress(artist)"
        class="grid-tile ${tileSpan(artist)}"
        style="background: linear-gradient(135deg, ${artist.color}40, ${artist.color}10)"
      >
        <div class="grid-tile-overlay"></div>
        <div class="grid-tile-content">
          <div class="grid-tile-name">${artist.name}</div>
          <div class="grid-tile-hype">${hypeIcon(artist)}</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Signup prompt banner -->
  <signup-prompt-banner
    visible.bind="showSignupBanner && !isAuthenticated"
    message="&#x1F514; 通知を有効にするには"
    signup-requested.trigger="onSignupRequested()">
  </signup-prompt-banner>

  <!-- Grid context menu dialog -->
  <dialog
    ref="contextMenuDialog"
    click.trigger="onContextMenuDialogClick($event)"
    class="bottom-sheet-dialog"
  >
    <div if.bind="contextMenuArtist" class="sheet-body">
      <div class="sheet-artist-name">${contextMenuArtist.name}</div>
      <div class="sheet-options">
        <button
          repeat.for="level of hypeLevels; key.bind: level"
          click.trigger="contextMenuSetLevel(level)"
          class="sheet-option-btn"
          data-active.bind="contextMenuArtist.hype === level ? '' : null"
        >
          <span class="sheet-option-icon">${hypeMeta[level].icon}</span>
          <span class="sheet-option-label">${trHypeLabel(level)}</span>
        </button>
        <div class="sheet-divider"></div>
        <button
          click.trigger="contextMenuUnfollow()"
          class="sheet-unfollow-btn"
        >
          <span class="sheet-option-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path>
            </svg>
          </span>
          <span t="myArtists.unfollow" class="sheet-option-label"></span>
        </button>
      </div>
    </div>
  </dialog>

</div>

<!-- Notification dialog (outside page-layout for proper top-layer stacking) -->
<hype-notification-dialog
  active.bind="showNotificationDialog"
  signup-requested.trigger="onSignupRequested()"
  dialog-dismissed.trigger="onDialogDismissed()">
</hype-notification-dialog>
