<import from="../../components/coach-mark/coach-mark"></import>
<import from="./my-artists-page.css"></import>

<div class="relative flex flex-col h-full bg-surface-base text-text-primary">
  <!-- Header -->
  <div class="shrink-0 px-4 py-4 border-b border-white/10 bg-surface-raised">
    <div class="flex items-center justify-between">
      <h1 t="nav.myArtists" class="font-display text-xl font-bold tracking-tight"></h1>
      <div class="flex items-center gap-2">
        <span if.bind="!isLoading && artists.length > 0" class="text-sm text-text-muted">(${artists.length})</span>
        <button
          if.bind="!isLoading && artists.length > 0"
          click.trigger="toggleView()"
          class="p-1.5 rounded-md hover:bg-white/10 transition-colors text-text-muted"
          aria-label="Toggle view"
        >
          <!-- List icon -->
          <svg if.bind="viewMode === 'grid'" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line>
            <line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line>
          </svg>
          <!-- Grid icon -->
          <svg if.bind="viewMode === 'list'" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Loading state -->
  <div if.bind="isLoading" class="flex-1 flex items-center justify-center">
    <div class="w-6 h-6 border-2 border-brand-primary border-t-transparent rounded-full animate-spin"></div>
  </div>

  <!-- Empty state -->
  <div if.bind="!isLoading && artists.length === 0" class="flex-1 flex flex-col items-center justify-center px-6">
    <svg class="w-16 h-16 text-text-muted mb-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18V5l12-2v13"></path>
      <circle cx="6" cy="18" r="3"></circle>
      <circle cx="18" cy="16" r="3"></circle>
    </svg>
    <h2 t="myArtists.empty.title" class="font-display text-lg font-bold mb-2"></h2>
    <p t="myArtists.empty.subtitle" class="text-sm text-text-muted text-center mb-6"></p>
    <button
      click.trigger="goToDiscover()"
      t="myArtists.empty.discoverButton"
      class="px-6 py-2.5 bg-brand-primary text-white font-display font-semibold text-sm rounded-[var(--radius-button)] hover:bg-brand-primary/80 transition-colors"
    ></button>
  </div>

  <!-- Artist list view -->
  <div if.bind="!isLoading && artists.length > 0 && viewMode === 'list'" class="flex-1 overflow-y-auto">
    <div class="px-4 py-3">
      <div
        repeat.for="artist of artists; key.bind: artist.id"
        class="relative overflow-hidden rounded-[var(--radius-card)] mb-2"
      >
        <!-- Delete zone (behind the row) -->
        <div class="absolute inset-y-0 end-0 w-20 bg-red-500 flex items-center justify-center">
          <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path>
          </svg>
        </div>

        <!-- Artist row (swipeable) -->
        <div
          touchstart.trigger="onTouchStart(artist, $event)"
          touchmove.trigger="onTouchMove($event) & throttle:16"
          touchend.trigger="onTouchEnd()"
          touchcancel.trigger="onTouchEnd()"
          class="relative flex items-center gap-3 px-4 py-3.5 bg-surface-raised border border-white/10 touch-pan-y transition-transform"
          transition-transform.class="swipedArtistId !== artist.id || swipeOffset >= 0"
          duration-200.class="swipedArtistId !== artist.id || swipeOffset >= 0"
          style="transform: translateX(${swipedArtistId === artist.id ? swipeOffset : 0}px)"
        >
          <!-- Color accent dot -->
          <div
            class="w-3 h-3 rounded-full shrink-0"
            style="background-color: ${artist.color}"
          ></div>

          <!-- Artist name -->
          <span class="text-sm text-text-primary font-medium truncate flex-1">${artist.name}</span>

          <!-- Passion level indicator -->
          <button
            click.trigger="openPassionSelector(artist)"
            data-passion-button
            class="shrink-0 text-base leading-none px-1.5 py-1 rounded-md hover:bg-white/10 transition-colors ${pulsingArtistId === artist.id ? 'animate-passion-pulse' : ''}"
            aria-label="Change passion level"
          >${passionIcon(artist)}</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Artist grid (festival) view -->
  <div if.bind="!isLoading && artists.length > 0 && viewMode === 'grid'" class="flex-1 overflow-y-auto">
    <div class="px-4 py-3 grid grid-cols-3 auto-rows-[minmax(6rem,auto)] gap-2">
      <div
        repeat.for="artist of artists; key.bind: artist.id"
        touchstart.trigger="onGridTouchStart(artist)"
        touchend.trigger="onGridTouchEnd()"
        touchcancel.trigger="onGridTouchEnd()"
        click.trigger="openPassionSelector(artist)"
        class="relative rounded-[var(--radius-card)] overflow-hidden border border-white/10 flex items-end select-none ${tileSpan(artist)}"
        style="background: linear-gradient(135deg, ${artist.color}40, ${artist.color}10)"
      >
        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
        <div class="relative w-full p-2">
          <div class="text-xs font-medium text-white truncate">${artist.name}</div>
          <div class="text-xs mt-0.5">${passionIcon(artist)}</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Grid context menu dialog -->
  <dialog
    ref="contextMenuDialog"
    click.trigger="onContextMenuDialogClick($event)"
    class="bottom-sheet-dialog"
  >
    <div if.bind="contextMenuArtist" class="w-full bg-surface-raised border-t border-white/10 rounded-t-2xl px-4 pt-4 pb-6">
      <div class="text-sm text-text-muted mb-3 truncate">${contextMenuArtist.name}</div>
      <div class="flex flex-col gap-1">
        <button
          repeat.for="level of passionLevels; key.bind: level"
          click.trigger="contextMenuSetLevel(level)"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors ${contextMenuArtist.passionLevel === level ? 'bg-brand-primary/20 text-brand-primary' : 'hover:bg-white/5 text-text-primary'}"
        >
          <span class="text-base w-8 text-center">${passionLevelMeta[level].icon}</span>
          <span class="text-sm font-medium">${trPassionLabel(level)}</span>
        </button>
        <div class="border-t border-white/10 my-1"></div>
        <button
          click.trigger="contextMenuUnfollow()"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-red-400 hover:bg-red-500/10 transition-colors"
        >
          <span class="text-base w-8 text-center">
            <svg class="w-4 h-4 inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path>
            </svg>
          </span>
          <span t="myArtists.unfollow" class="text-sm font-medium"></span>
        </button>
      </div>
    </div>
  </dialog>

  <!-- Undo toast (top-layer popover to stay above dialogs) -->
  <div
    ref="undoPopoverEl"
    popover="manual"
    role="status"
    class="fixed [inset-block-end:5rem] [inset-inline:1rem] m-0 bg-surface-overlay border border-white/10 rounded-[var(--radius-card)] px-4 py-3 flex items-center justify-between shadow-lg"
  >
    <span class="text-sm text-text-primary">${$this.i18n?.tr('myArtists.unfollowed', { name: undoArtist?.name }) ?? ''}</span>
    <button
      click.trigger="undo()"
      t="myArtists.undo"
      class="text-sm font-semibold text-brand-primary hover:text-brand-primary/80 transition-colors ms-4"
    ></button>
  </div>

  <!-- Passion level selector dialog -->
  <dialog
    ref="passionSelectorDialog"
    click.trigger="onPassionSelectorDialogClick($event)"
    class="bottom-sheet-dialog"
  >
    <div if.bind="selectorArtist" class="w-full bg-surface-raised border-t border-white/10 rounded-t-2xl px-4 pt-4 pb-6">
      <div class="text-sm text-text-muted mb-3 truncate">${selectorArtist.name}</div>
      <div class="flex flex-col gap-1">
        <button
          repeat.for="level of passionLevels; key.bind: level"
          click.trigger="selectPassionLevel(level)"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors ${selectorArtist.passionLevel === level ? 'bg-brand-primary/20 text-brand-primary' : 'hover:bg-white/5 text-text-primary'}"
        >
          <span class="text-base w-8 text-center">${passionLevelMeta[level].icon}</span>
          <span class="text-sm font-medium">${trPassionLabel(level)}</span>
        </button>
      </div>
    </div>
  </dialog>

  <!-- Tutorial Step 5: Coach mark on first artist's passion button -->
  <coach-mark
    target-selector="[data-passion-button]"
    message.bind="$this.i18n?.tr('myArtists.coachMark.setPassion') ?? ''"
    active.bind="isTutorialStep5 && !isLoading && artists.length > 0"
  ></coach-mark>

  <!-- Tutorial: Passion level notification explanation -->
  <dialog
    ref="passionExplanationDialog"
    cancel.trigger="$event.preventDefault()"
    class="passion-explanation-dialog"
  >
    <div class="mx-6 bg-surface-raised border border-white/10 rounded-2xl p-6 max-w-sm">
      <div class="text-center">
        <div class="text-3xl mb-3">🔔</div>
        <h3 t="myArtists.passionExplanation.title" class="font-display text-lg font-bold text-text-primary mb-2"></h3>
        <p t="myArtists.passionExplanation.description" class="text-sm text-text-muted leading-relaxed"></p>
      </div>
    </div>
  </dialog>
</div>
