<import from="./components/error-banner/error-banner"></import>
<import from="./components/pwa-install-fab/pwa-install-fab"></import>
<import from="./components/notification-prompt/notification-prompt"></import>
<import from="./components/snack-bar/snack-bar"></import>
<import from="./components/coach-mark/coach-mark"></import>

<au-viewport></au-viewport>

<bottom-nav-bar show.bind="showNav"></bottom-nav-bar>

<!-- Top-layer overlays: rendered via popover/dialog in browser top layer,
     DOM position is irrelevant. Placed outside viewport to avoid grid interference. -->
<!-- Single instance guaranteed by app-shell — safe to use static id="pwa-fab-sheet-title" inside -->
<pwa-install-fab if.bind="showNav"></pwa-install-fab>
<notification-prompt if.bind="auth.isAuthenticated && onboarding.isCompleted && showNav"></notification-prompt>
<snack-bar></snack-bar>
<error-banner></error-banner>

<!-- Onboarding coach mark: single instance driven by onboarding service -->
<coach-mark
  target-selector.bind="onboarding.spotlightTarget"
  message.bind="onboarding.spotlightMessage"
  spotlight-radius.bind="onboarding.spotlightRadius"
  active.bind="onboarding.spotlightActive"
  on-tap.bind="() => onboarding.onSpotlightTap?.()"
></coach-mark>
